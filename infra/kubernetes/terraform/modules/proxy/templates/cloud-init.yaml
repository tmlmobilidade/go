runcmd:
  # Remove default nginx site to avoid duplicate default_server conflict
  - rm -f /etc/nginx/sites-enabled/default
  # Allow all proxy ports through OS firewall (OCI Ubuntu blocks non-22 ports by default)
  - iptables -I INPUT 4 -p tcp --dport 80   -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8080 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8081 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8082 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8083 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8084 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8085 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8086 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8087 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8088 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8089 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8090 -m state --state NEW -j ACCEPT
  - iptables -I INPUT 4 -p tcp --dport 8091 -m state --state NEW -j ACCEPT
  - service netfilter-persistent save
  # Validate and reload nginx
  - nginx -t
  - systemctl enable nginx
  - systemctl restart nginx

final_message: "Kubernetes proxy is ready after $UPTIME seconds"
