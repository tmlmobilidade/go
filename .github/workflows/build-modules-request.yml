name: Build Modules (picker)

on:
  issue_comment:
    types:
      - created

permissions:
  pull-requests: write
  issues: write
  contents: read
  packages: write

concurrency:
  group: build-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  parse-selection:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/build-modules') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-24.04-arm
    outputs:
      modules: ${{ steps.parse.outputs.modules }}
      head-sha: ${{ steps.parse.outputs.head-sha }}
      pr-number: ${{ steps.parse.outputs.pr-number }}
    steps:
      - uses: actions/github-script@v8
        id: parse
        with:
          script: |
            const marker = '<!-- go-modules-build-picker -->';
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const picker = comments.find((c) => c.body?.includes(marker));
            if (!picker?.body) { core.setFailed('Picker comment not found.'); return; }

            const selected = [];
            let match;
            const re = /^- \[(x|X)\] ([\w-]+)\s*$/gm;
            while ((match = re.exec(picker.body)) !== null) selected.push(match[2].toLowerCase());
            if (!selected.length) { core.setFailed('Check at least one module.'); return; }

            core.setOutput('modules', selected.join(','));
            core.setOutput('head-sha', pr.head.sha);
            core.setOutput('pr-number', String(prNumber));

  discover:
    name: Discover Modules
    needs: parse-selection
    runs-on: ubuntu-24.04-arm
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      modules-apps: ${{ steps.discover.outputs.modules-apps }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.parse-selection.outputs.head-sha }}
          fetch-depth: 2

      - id: scan
        shell: bash
        run: |
          MAPPING=$(find modules/*/apps/* -maxdepth 0 -type d | sort | sed 's|modules/||; s|/apps/|:|')
          { echo "modules-apps<<EOF"; echo "$MAPPING"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - id: discover
        uses: ./.github/actions/discover-modules
        with:
          modules-apps: ${{ steps.scan.outputs.modules-apps }}
          selected-modules: ${{ needs.parse-selection.outputs.modules }}
          selected-module: all
          build-all: false

  package-lock:
    name: Generate package-lock.json
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.parse-selection.outputs.head-sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - run: npm install --package-lock-only --ignore-scripts

      - uses: actions/upload-artifact@v7
        with:
          name: package-lock
          path: package-lock.json
          retention-days: 1

  notify-infra:
    name: Notify Infrastructure
    needs: [package-lock, parse-selection]
    if: needs.package-lock.result == 'success'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: tmlmobilidade/go-infra
          event-type: preview-pr
          client-payload: >-
            {
              "pr_number": ${{ needs.parse-selection.outputs.pr-number }},
              "pr_action": "synchronize"
            }

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover, package-lock, parse-selection]
    if: needs.discover.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover.outputs.modules-apps }}
      image-tag: pr-${{ needs.parse-selection.outputs.pr-number }}
      environment: pr-${{ needs.parse-selection.outputs.pr-number }}
      ref: ${{ needs.parse-selection.outputs.head-sha }}
    secrets: inherit
