# # #

name: 'All Modules | Build & Test'

# # #

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - staging
      - 'staging/**'
    paths:
      - 'modules/**'
      - '!modules/*/environments/**'
      - 'packages/**'
      - '.github/workflows/build-all-modules.yml'

# # #

jobs:

  check-packages-changed:
    name: Check Packages Changed
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if packages changed
        id: check
        run: |
          # On workflow_dispatch, build all apps
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - will build all apps"
          # Check if HEAD^ exists (might not exist on first commit or shallow clone)
          elif ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "No previous commit found - will build all apps"
          elif git diff --quiet HEAD^ HEAD -- "packages/"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Packages did not change"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Packages changed - will build all apps"
          fi

  discover-apps:
    name: Discover Apps
    needs: check-packages-changed
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-matrix.outputs.apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Discover apps with Dockerfiles and check changes
        id: set-matrix
        run: |
          PACKAGES_CHANGED="${{ needs.check-packages-changed.outputs.changed }}"
          APPS_ARRAY=()
          
          echo "Packages changed: $PACKAGES_CHANGED"
          
          for module_dir in modules/*/; do
            module=$(basename "$module_dir")
            for app_dir in "${module_dir}apps"/*/; do
              if [ -f "${app_dir}Dockerfile" ]; then
                app=$(basename "$app_dir")
                app_path="modules/${module}/apps/${app}/"
                
                # If packages changed or manual trigger, include all apps
                # Otherwise, check if this specific app changed
                if [ "$PACKAGES_CHANGED" = "true" ]; then
                  echo "Including ${module}|${app} (packages changed or manual trigger)"
                  APPS_ARRAY+=("${module}|${app}")
                elif ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                  echo "Including ${module}|${app} (no previous commit found)"
                  APPS_ARRAY+=("${module}|${app}")
                elif git diff --quiet HEAD^ HEAD -- "$app_path"; then
                  echo "Skipping ${module}|${app} (no changes)"
                else
                  echo "Including ${module}|${app} (app changed)"
                  APPS_ARRAY+=("${module}|${app}")
                fi
              fi
            done
          done
          
          if [ ${#APPS_ARRAY[@]} -eq 0 ]; then
            echo "No apps to build"
            APPS="[]"
          else
            APPS=$(printf '%s\n' "${APPS_ARRAY[@]}" | jq -R . | jq -s -c .)
          fi
          
          {
            echo "apps<<EOF"
            echo "$APPS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Apps to build: $APPS"

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build:
    name: Build ${{ matrix.app }}
    needs: discover-apps
    if: needs.discover-apps.outputs.apps != '[]'
    runs-on: ubuntu-latest
    concurrency:
      group: build-all-modules-${{ matrix.app }}
      cancel-in-progress: false
    permissions:
      contents: read
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse module and app
        id: parse
        run: |
          IFS='|' read -r module app <<< "${{ matrix.app }}"
          echo "module=$module" >> $GITHUB_OUTPUT
          echo "app=$app" >> $GITHUB_OUTPUT
          echo "Parsed: module=$module, app=$app"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./modules/${{ steps.parse.outputs.module }}/apps/${{ steps.parse.outputs.app }}/Dockerfile
          push: false
          tags: ghcr.io/tmlmobilidade/go-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}:${{ github.ref_name }}
          build-args: |
            ENVIRONMENT=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}.tar

      - name: Save Docker Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}
          path: /tmp/image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}.tar
          retention-days: 1


  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  publish:
    name: Publish ${{ matrix.app }}
    needs: [discover-apps, build]
    if: needs.discover-apps.outputs.apps != '[]' && success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse module and app
        id: parse
        run: |
          IFS='|' read -r module app <<< "${{ matrix.app }}"
          echo "module=$module" >> $GITHUB_OUTPUT
          echo "app=$app" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}

      - name: Load Docker Image
        run: |
          docker load -i image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}.tar

      - name: Push Docker Image
        run: |
          docker push ghcr.io/tmlmobilidade/go-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}:${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  cleanup:
    name: Cleanup on Failure
    needs: [discover-apps, build, publish]
    if: always() && needs.discover-apps.outputs.apps != '[]' && (needs.build.result == 'failure' || needs.publish.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse module and app
        id: parse
        run: |
          IFS='|' read -r module app <<< "${{ matrix.app }}"
          echo "module=$module" >> $GITHUB_OUTPUT
          echo "app=$app" >> $GITHUB_OUTPUT

      - name: Delete Published Images
        if: needs.publish.result == 'failure'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="go-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}"
          TAG="${{ github.ref_name }}"
          echo "Attempting to delete published image: $PACKAGE_NAME:$TAG"
          
          # Get the version ID for the tag
          VERSION_ID=$(gh api "/orgs/tmlmobilidade/packages/container/$PACKAGE_NAME/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"$TAG\") | .id" | head -n1)
          
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting version $VERSION_ID of package $PACKAGE_NAME"
            gh api --method DELETE "/orgs/tmlmobilidade/packages/container/$PACKAGE_NAME/versions/$VERSION_ID" \
              || echo "Warning: Failed to delete image version (may have been already deleted)"
          else
            echo "No version found with tag $TAG, skipping deletion"
          fi

      - name: Delete Artifacts
        continue-on-error: true
        uses: geekyeggo/delete-artifact@v5
        with:
          name: docker-image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}

