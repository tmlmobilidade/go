name: Build Modules

on:
  workflow_dispatch:
  push:
    branches:
      - prd
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # # #
  # Auto-discover all module/app pairs from the filesystem

  discover:
    name: Discover Apps
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: modules
      - id: discover
        run: |
          MATRIX=$(find modules/*/apps/* -maxdepth 0 -type d | sort | while read -r dir; do
            MODULE=$(echo "$dir" | cut -d/ -f2)
            APP=$(echo "$dir" | cut -d/ -f4)
            echo "{\"module\":\"$MODULE\",\"app\":\"$APP\"}"
          done | jq -s '.')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "$MATRIX" | jq .

  # # #
  # Generate package-lock.json once, shared across all builds

  package-lock:
    name: Generate package-lock.json
    needs: discover
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install --package-lock-only

      - uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: package-lock.json
          retention-days: 1

  # # #
  # Build and push Docker image for each module/app

  build:
    name: ${{ matrix.module }}/${{ matrix.app }}
    needs: [discover, package-lock]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          CUSTOM="modules/${{ matrix.module }}/apps/${{ matrix.app }}/Dockerfile"
          if [ -f "$CUSTOM" ]; then
            echo "path=$CUSTOM" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.app }}" = "frontend" ]; then
            echo "path=.github/templates/docker/frontend.dockerfile" >> $GITHUB_OUTPUT
          else
            echo "path=.github/templates/docker/nodejs.dockerfile" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          name: package-lock

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          tags: ghcr.io/tmlmobilidade/go-${{ matrix.module }}-${{ matrix.app }}:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
          build-args: |
            MODULE=${{ matrix.module }}
            APP=${{ matrix.app }}
            ENVIRONMENT=prd
            NGINX_SERVER_NAME=go.tmlmobilidade.pt

  # # #
  # Notify go-infra repo for PR preview environments

  notify-infra:
    name: Notify Infrastructure
    needs: [build]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (github.event.action == 'closed' || needs.build.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: tmlmobilidade/go-infra
          event-type: preview-pr
          client-payload: >-
            {
              "pr_number": ${{ github.event.pull_request.number }},
              "pr_action": "${{ github.event.action }}"
            }



