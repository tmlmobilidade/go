name: Build Modules (requested)

on:
  issue_comment:
    types:
      - created

permissions:
  pull-requests: write
  issues: write
  contents: read
  packages: write

concurrency:
  group: build-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  parse-request:
    name: Parse module selection
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/build-modules') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-24.04-arm
    outputs:
      modules: ${{ steps.parse.outputs.modules }}
      head-sha: ${{ steps.parse.outputs.head-sha }}
      pr-number: ${{ steps.parse.outputs.pr-number }}
    steps:
      - name: Parse picker comment and PR head
        id: parse
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- go-modules-build-picker -->';
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const picker = comments.find((comment) => comment.body?.includes(marker));
            if (!picker?.body) {
              core.setFailed('Module picker comment not found.');
              return;
            }

            const selected = [];
            const linePattern = /^- \[(x|X)\] ([\w-]+)\s*$/gm;
            let match;
            while ((match = linePattern.exec(picker.body)) !== null) {
              selected.push(match[2].toLowerCase());
            }

            if (selected.length === 0) {
              core.setFailed('No modules checked in the picker comment.');
              return;
            }

            core.setOutput('modules', selected.join(','));
            core.setOutput('head-sha', pr.head.sha);
            core.setOutput('pr-number', String(prNumber));

      - name: Acknowledge build request
        if: success() && steps.parse.outputs.modules != ''
        uses: actions/github-script@v8
        with:
          script: |
            const modules = '${{ steps.parse.outputs.modules }}'.split(',').join(', ');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Building selected modules only: **${modules}** (@${context.actor})`,
            });

      - name: Report selection error
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `@${context.actor} — could not start the build.`,
                '',
                'Edit the **module picker** comment, check the modules you need, save, then comment `/build-modules` again.',
              ].join('\n'),
            });

  build:
    name: Build selected modules
    needs: parse-request
    if: needs.parse-request.outputs.modules != ''
    uses: ./.github/workflows/_build-modules-pipeline.yml
    with:
      selected-modules: ${{ needs.parse-request.outputs.modules }}
      selected-module: all
      build-all: false
      ref: ${{ needs.parse-request.outputs.head-sha }}
      fetch-depth: '2'
      image-tag: pr-${{ needs.parse-request.outputs.pr-number }}
      environment: pr-${{ needs.parse-request.outputs.pr-number }}
      notify-infra: true
      pr-number: ${{ needs.parse-request.outputs.pr-number }}
      pr-action: synchronize
    secrets: inherit
