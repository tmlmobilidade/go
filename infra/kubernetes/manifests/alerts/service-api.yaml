apiVersion: v1
kind: Service
metadata:
  # Name must match the upstream in the baked-in nginx config: "server api:5050"
  name: api
  namespace: go-alerts
  labels:
    app: alerts-api
    app.kubernetes.io/name: alerts-api
    app.kubernetes.io/part-of: go-alerts
spec:
  type: ClusterIP
  selector:
    app: alerts-api
  ports:
    - name: http
      port: 5050
      targetPort: http
      protocol: TCP
