#cloud-config
# Kubernetes Nginx Proxy - Cloud Init Configuration
# Forwards internet traffic to Kubernetes worker nodes via NodePort.
# Single server on port 80, path-based routing to each module's NodePort.

package_update: true

packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - iptables-persistent

write_files:
  - path: /etc/nginx/conf.d/kubernetes-proxy.conf
    permissions: '0644'
    content: |
      # WebSocket upgrade support
      map $${http_upgrade} $${connection_upgrade} {
        default upgrade;
        ''      close;
      }

      # All traffic goes to the gateway NodePort.
      # The gateway pod (nginx:alpine + ConfigMap) handles path-based routing
      # to each module's ClusterIP service internally within the cluster.
      upstream k8s_gateway {
        least_conn;
      %{ for ip in worker_node_ips ~}
        server ${ip}:30080 max_fails=3 fail_timeout=30s;
      %{ endfor ~}
        keepalive 32;
      }

      server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Proxy VM health check (does not hit k8s)
        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }

        location / {
          proxy_pass         http://k8s_gateway;
          proxy_http_version 1.1;
          proxy_set_header   Host              $${host};
          proxy_set_header   X-Real-IP         $${remote_addr};
          proxy_set_header   X-Forwarded-For   $${proxy_add_x_forwarded_for};
          proxy_set_header   X-Forwarded-Proto $${scheme};
          proxy_set_header   Upgrade           $${http_upgrade};
          proxy_set_header   Connection        $${connection_upgrade};
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }
      }

runcmd:
  # Remove default nginx site to avoid duplicate default_server conflict
  - rm -f /etc/nginx/sites-enabled/default
  # Allow port 80 through OS firewall (only port needed with path-based routing)
  # Only port 80 needed — gateway handles all internal routing
  - iptables -I INPUT 4 -p tcp --dport 80 -m state --state NEW -j ACCEPT
  - service netfilter-persistent save
  # Validate and reload nginx
  - nginx -t
  - systemctl enable nginx
  - systemctl restart nginx

final_message: "Kubernetes proxy is ready after $UPTIME seconds"
