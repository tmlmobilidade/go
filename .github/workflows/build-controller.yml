# # #

name: 'Controller | Build & Test'

# # #

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - staging
      - 'staging/**'
    paths:
      - 'modules/controller/**'
      - '!modules/controller/environments/**'
      - 'packages/**'
      - '.github/workflows/build-controller.yml'

# # #

jobs:

  discover-apps:
    name: Discover Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-matrix.outputs.apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover apps with Dockerfiles
        id: set-matrix
        run: |
          APPS=$(for dir in modules/controller/apps/*/; do
            if [ -f "${dir}Dockerfile" ]; then
              basename "$dir"
            fi
          done | jq -R . | jq -s .)
          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "Discovered apps: $APPS"

  build:
    name: ${{ matrix.app }} (NodeJS)
    needs: discover-apps
    uses: ./.github/workflows/_build-and-publish.yml
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    with:
      file: ./modules/controller/apps/${{ matrix.app }}/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-controller-${{ matrix.app }}:${{ github.ref_name }}
      environment: ${{ github.ref_name }}