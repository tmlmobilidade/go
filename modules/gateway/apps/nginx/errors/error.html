<head>
	<title>GO | Erro Inesperado</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

	<style>
		body {
			font-family: Verdana, Geneva, Tahoma, sans-serif;
			text-align: center;
			display: flex;
			justify-content: center;
			flex-direction: column;
			height: 100vh;
			align-items: center;
			background-color: rgb(45, 15, 115);
			color: white;
			padding: 0;
			margin: 0;
		}
		.title {
			font-family: "Cherry Bomb One", system-ui;
			font-weight: 400;
			line-height: 1;
			font-style: normal;
			font-size: 100px;
			margin: 0;
			margin-bottom: 20px;
			opacity: 0.5;
		}
		.text {
			font-family: "Work Sans", sans-serif;
			font-optical-sizing: auto;
			font-style: normal;
			max-width: 400px;
			font-weight: 600;
			letter-spacing: 0.5px;
			line-height: 1.6;
			font-size: 18px;
		}
	</style>

	<h1 class="title">Ooops...</h1>

	<p class="text">Um componente ficou indisponível e tem que ser manualmente iniciado. A equipa está a ser notificada neste exato momento para corrigir a situação.</p>
	<p class="text" style="font-size:14px;text-transform: uppercase;">Notificações enviadas até agora: <span id="counter">0</span></p>
	<p id="retry" class="text" style="font-size:20px;font-weight:500; display:none;">A verificar se o erro está corrigido...</p>

	<script>

		/**
		 * Increases the notification counter
		 * displayed on the page.
		 */
		function increaseCounter() {
			const counterElem = document.getElementById("counter");
			let counterValue = parseInt(counterElem.innerText);
			counterElem.innerText = counterValue + 1;
		}

		/**
		 * Sends a ping to the status API
		 * to notify about the error.
		 */
		function ping() {
			// Generic ping URL
			let pingUrl = "https://status.carrismetropolitana.pt/api/push/6Y8qbM6kz52yK5JnYZfbAOS8RN11FINr?status=down&msg=NOK&ping=";
			// Customize ping URL based on the current path
			if (window.location.pathname.startsWith("/alerts")) pingUrl = "https://status.carrismetropolitana.pt/api/push/PTgVOXKYmTNMDdFKhJhowOCZuz5BFr58?status=down&msg=NOK&ping=";
			if (window.location.pathname.startsWith("/auth")) pingUrl = "https://status.carrismetropolitana.pt/api/push/HneRxxJeybvRYe83p8WaS0Q5S4UHSSyq?status=down&msg=NOK&ping=";
			if (window.location.pathname.startsWith("/controller")) pingUrl = "https://status.carrismetropolitana.pt/api/push/A97Y1RYRjy0lH4pOTwW3qmPDjhiDnqW5?status=down&msg=NOK&ping=";
			if (window.location.pathname.startsWith("/exporter")) pingUrl = "https://status.carrismetropolitana.pt/api/push/Z8bUQNRaTEF1QeXhuuuI9UkuT7qORYgX?status=down&msg=NOK&ping=";
			if (window.location.pathname.startsWith("/locations")) pingUrl = "https://status.carrismetropolitana.pt/api/push/9kyxYSUTrPa8NviJExD9taiCCV5ROnFu?status=down&msg=NOK&ping=";
			if (window.location.pathname.startsWith("/performance")) pingUrl = "https://status.carrismetropolitana.pt/api/push/3jIWuUV43OXgSdv1cmV4G4G3Fs6xNt2G?status=down&msg=NOK&ping=";
			if (window.location.pathname.startsWith("/plans")) pingUrl = "https://status.carrismetropolitana.pt/api/push/87StVYwQPvQd78uEh1db2nLuOaPDhnLo?status=down&msg=NOK&ping=";
			if (window.location.pathname.startsWith("/stops")) pingUrl = "https://status.carrismetropolitana.pt/api/push/zKnHYH5pgnpkKzCLu4eP4zvLDFHmYwJV?status=down&msg=NOK&ping=";
			// Actually send the ping request
			fetch(pingUrl).then(increaseCounter).catch(err => console.error("Request failed:", err));
		}

		/**
		 * Reloads the page after a timeout
		 * to try again.
		 */
		function reloadPage() {
			document.getElementById("retry").style.display = "block";
			setTimeout(() => window.location.reload(), 3_000);
		}

		//
		// Send the first ping immediately
		// and then every 5 seconds.

		ping();
		setInterval(ping, 1_000);

		//
		// After 15 seconds elapsed,
		// reload the page to try again.

		setTimeout(reloadPage, 15_000);

	</script>

</body>
