#cloud-config
# Kubernetes Nginx Proxy - Cloud Init Configuration
# Forwards internet traffic to Kubernetes worker nodes via NodePort.

package_update: true

packages:
  - nginx
  - certbot
  - python3-certbot-nginx

write_files:
  - path: /etc/nginx/conf.d/kubernetes-proxy.conf
    permissions: '0644'
    content: |
      upstream k8s_workers {
        least_conn;
      %{ for ip in worker_node_ips ~}
        server ${ip}:${node_port} max_fails=3 fail_timeout=30s;
      %{ endfor ~}
        keepalive 32;
      }

      server {
        listen 80 default_server;
        listen [::]:80 default_server;

        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }

        location / {
          proxy_pass         http://k8s_workers;
          proxy_http_version 1.1;
          proxy_set_header   Host              $${host};
          proxy_set_header   X-Real-IP         $${remote_addr};
          proxy_set_header   X-Forwarded-For   $${proxy_add_x_forwarded_for};
          proxy_set_header   X-Forwarded-Proto $${scheme};
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }
      }

      upstream k8s_auth {
        least_conn;
      %{ for ip in worker_node_ips ~}
        server ${ip}:${auth_node_port} max_fails=3 fail_timeout=30s;
      %{ endfor ~}
        keepalive 32;
      }

      server {
        listen 8080;
        listen [::]:8080;

        location / {
          proxy_pass         http://k8s_auth;
          proxy_http_version 1.1;
          proxy_set_header   Host              $${host};
          proxy_set_header   X-Real-IP         $${remote_addr};
          proxy_set_header   X-Forwarded-For   $${proxy_add_x_forwarded_for};
          proxy_set_header   X-Forwarded-Proto $${scheme};
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }
      }

runcmd:
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t
  - systemctl enable nginx
  - systemctl restart nginx

final_message: "Kubernetes proxy is ready after $UPTIME seconds"
