apiVersion: v1
kind: Service
metadata:
  # Name must match the upstream in the baked-in nginx config: "server api:5050"
  name: api
  namespace: go-offer
  labels:
    app: offer-api
    app.kubernetes.io/name: offer-api
    app.kubernetes.io/part-of: go-offer
spec:
  type: ClusterIP
  selector:
    app: offer-api
  ports:
    - name: http
      port: 5050
      targetPort: http
      protocol: TCP
