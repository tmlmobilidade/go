# Massive thank you to @ricardojorgerm and @tiagogaspar8
# for the help in creating this nginx configuration file.


# # #
# USER

user nginx;


# # #
# WORKER PROCESSES

worker_processes auto;


# # #
# DEFAULTS

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;


# # #
# EVENTS

events {
	use epoll;
	worker_connections 8192;
	multi_accept on;
}


# # #
# HTTP

http {

	# # #
	# MIME TYPES

	include /etc/nginx/mime.types;
	default_type application/octet-stream;


	# # #
	# LOGS

	log_format main '[$time_iso8601] | IP: $remote_addr | Request: $status "$request" | Referer: "$http_referer" | User Agent: "$http_user_agent"';

	access_log /var/log/nginx/access.log main buffer=32k flush=3s;


	# # #
	# FILE DESCRIPTOR SETTINGS

	aio threads;
	directio 512M;
	output_buffers 2 1M;
	sendfile on;
	tcp_nopush on;

	keepalive_timeout 65;


	# # #
	# RATE LIMITS

	limit_req_zone global zone=global:10m rate=500r/s;
	limit_req zone=global burst=200 delay=2;

	limit_req_zone $binary_remote_addr zone=ip:10m rate=100r/s;
	limit_req zone=ip burst=100 delay=2;

	limit_req_status 429;


	# # #
	# COMPRESSION

	gzip on;
	gzip_types application/json;


	# # #
	# UPSTREAM

	upstream api_upstream {
		least_conn;
		zone api_upstream 64K;
		server api:5050;
		keepalive 10;
	}

	# upstream frontend_upstream {
	# 	least_conn;
	# 	zone frontend_upstream 64K;
	# 	server frontend:3000;
	# 	keepalive 10;
	# }


	# # #
	# HTTP SERVER

	server {

		listen 80;
		listen [::]:80;
		server_tokens off;

		# Proxy configuration
		proxy_http_version 1.1;
		proxy_connect_timeout 10s;
		proxy_send_timeout 20s;
		proxy_read_timeout 20s;
		proxy_set_header Connection "";
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

		location /api/ {
			proxy_pass http://api_upstream/;
			proxy_http_version 1.1;
		}

		# location / {
		# 	proxy_pass http://frontend_upstream/;
		# 	proxy_http_version 1.1;
		# }

	}

}