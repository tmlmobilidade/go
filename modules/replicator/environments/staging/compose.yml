        max-file: '1'
    env_file:
      - ./secrets/.env

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  sync-apex-on-board-sales:
    image: ghcr.io/tmlmobilidade/go-replicator-sync-apex-on-board-sales:staging
