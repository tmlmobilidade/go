apiVersion: v1
kind: Service
metadata:
  name: exporter-nginx
  namespace: go-exporter
  labels:
    app: exporter-nginx
    app.kubernetes.io/name: exporter-nginx
    app.kubernetes.io/part-of: go-exporter
spec:
  type: NodePort
  selector:
    app: exporter-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30091
      protocol: TCP
