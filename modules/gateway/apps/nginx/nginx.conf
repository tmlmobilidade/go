# Massive thank you to @ricardojorgerm and @tiagogaspar8
# for the help in creating this nginx configuration file.



# # #
# USER

user nginx;



# # #
# WORKER PROCESSES

worker_processes auto;



# # #
# DEFAULTS

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;



# # #
# EVENTS

events {
	 use epoll;
	 worker_connections 8192;
	 multi_accept on;
}



# # #
# HTTP

http {


	# # #
	# MIME TYPES

	include /etc/nginx/mime.types;
	default_type application/octet-stream;


	# # #
	# LOGS

	log_format main '$time_iso8601 | $status | IP $remote_addr | Request: "$request" | Referer: "$http_referer" | User Agent: "$http_user_agent"';

	access_log /var/log/nginx/access.log main buffer=32k flush=3s;


	# # #
	# FILE DESCRIPTOR SETTINGS

	aio threads;
	directio 512M;
	output_buffers 2 1M;
	sendfile on;
	tcp_nopush on;

	keepalive_timeout 65;


	# # #
	# RATE LIMITS

	limit_req_zone global zone=global:10m rate=500r/s;
	limit_req zone=global burst=200 delay=2;

	limit_req_zone $binary_remote_addr zone=ip:10m rate=50r/s;
	limit_req zone=ip burst=50 delay=2;

	limit_req_status 429;


	# # #
	# COMPRESSION

	gzip on;
	gzip_types application/json;


	# # #
	# UPSTREAM

	# Alerts

	upstream alerts_api_upstream {
		least_conn;
		zone alerts_api_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	upstream alerts_frontend_upstream {
		least_conn;
		zone alerts_frontend_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	# Auth

	upstream auth_api_upstream {
		least_conn;
		zone auth_api_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	upstream auth_frontend_upstream {
		least_conn;
		zone auth_frontend_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	# Controller

	upstream controller_api_upstream {
		least_conn;
		zone controller_api_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	upstream controller_frontend_upstream {
		least_conn;
		zone controller_frontend_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	# Locations

	upstream locations_api_upstream {
		least_conn;
		zone locations_api_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	# Performance

	upstream performance_api_upstream {
		least_conn;
		zone performance_api_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	upstream performance_frontend_upstream {
		least_conn;
		zone performance_frontend_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	# Plans

	upstream plans_api_upstream {
		least_conn;
		zone plans_api_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	upstream plans_frontend_upstream {
		least_conn;
		zone plans_frontend_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	# Stops

	upstream stops_api_upstream {
		least_conn;
		zone stops_api_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}

	upstream stops_frontend_upstream {
		least_conn;
		zone stops_frontend_upstream 64K;
		server 10.81.100.22 max_fails=30 fail_timeout=60s;
		keepalive 10;
	}


	# # #
	# HTTP SERVER
	# Redirect to HTTPS

	server {

		listen 80;
		listen [::]:80;
		server_name go.tmlmobilidade.pt;
		server_tokens off;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
			return 301 https://$host$request_uri;
		}

	}


	# # #
	# HTTPS SERVER

	server {

		listen 443 ssl;
		listen [::]:443 ssl;
		server_name go.tmlmobilidade.pt;
		server_tokens off;
		http2 on;

		# Lets Encrypt Certificates
		ssl_certificate /etc/letsencrypt/live/go.tmlmobilidade.pt/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/go.tmlmobilidade.pt/privkey.pem;
		include /etc/letsencrypt/options-ssl-nginx.conf;
		ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
		ssl_early_data on;

		# Proxy configuration
		proxy_http_version 1.1;
		proxy_connect_timeout 10s;
		proxy_send_timeout 20s;
		proxy_read_timeout 20s;
		proxy_set_header Connection "";
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_next_upstream error timeout http_500;


		# Alerts

		location /alerts {
			proxy_pass http://alerts_frontend_upstream;
		}

		location /alerts/api {
			proxy_pass http://alerts_api_upstream;
		}

		# Auth

		location /auth {
			proxy_pass http://auth_frontend_upstream;
		}

		location /auth/api {
			proxy_pass http://auth_api_upstream;
		}

		# Controller

		location /controller {
			proxy_pass http://controller_frontend_upstream;
		}

		location /controller/api {
			proxy_pass http://controller_api_upstream;
		}

		# Locations

		location /locations/api {
			proxy_pass http://locations_api_upstream;
		}

		# Performance

		location /performance {
			proxy_pass http://performance_frontend_upstream;
		}

		location /performance/api {
			proxy_pass http://performance_api_upstream;
		}

		# Plans

		location /plans {
			proxy_pass http://plans_frontend_upstream;
		}

		location /plans/api {
			proxy_pass http://plans_api_upstream;
		}

		# Stops

		location /stops {
			proxy_pass http://stops_frontend_upstream;
		}

		location /stops/api {
			proxy_pass http://stops_api_upstream;
		}

		# Root

		location / {
			add_header Location /auth;
			return 302;
		}

		# Enable for basic statistics
		# location = /basic_status {
		# 	 stub_status;
		# }

	}

}