apiVersion: apps/v1
kind: Deployment
metadata:
  name: dates-frontend
  namespace: go-dates
  labels:
    app: dates-frontend
    app.kubernetes.io/name: dates-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: go-dates
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dates-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: dates-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [dates-frontend]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: ghcr.io/tmlmobilidade/go-dates-frontend:k8s
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: dates-secret
          livenessProbe:
            httpGet:
              path: /dates
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /dates
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
