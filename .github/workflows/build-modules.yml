name: Build Modules

on:
  workflow_dispatch:
    inputs:
      modules:
        description: 'Comma-separated modules (empty = today’s auto/dispatch rules)'
        required: false
        default: ''
        type: string
      module:
        description: 'Legacy single module (or "all"); ignored when modules is set'
        required: false
        default: 'all'
        type: string
      build_all:
        description: 'Build every module when no specific module is selected'
        required: false
        default: true
        type: boolean
  push:
    branches:
      - prd
    paths:
      - 'modules/**'
      - 'packages/**'
      - '.github/workflows/build-modules.yml'
      - '.github/workflows/_build-modules-pipeline.yml'
      - '.github/workflows/build-modules-request.yml'
      - '.github/workflows/pr-module-picker.yml'
      - '.github/actions/**/*'
      - '.github/templates/**/*'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # PR push / prd push: unchanged — diff-based discovery (module change → that module; packages/** → all).
  pipeline:
    name: Build Modules
    if: github.event.action != 'closed'
    uses: ./.github/workflows/_build-modules-pipeline.yml
    with:
      selected-modules: ${{ github.event_name == 'workflow_dispatch' && inputs.modules || '' }}
      selected-module: ${{ github.event_name == 'workflow_dispatch' && inputs.module || 'all' }}
      build-all: ${{ github.event_name != 'workflow_dispatch' || inputs.build_all }}
      fetch-depth: ${{ github.event_name == 'push' && '0' || '2' }}
      image-tag: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
      environment: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
      notify-infra: ${{ github.event_name == 'pull_request' }}
      pr-number: ${{ github.event.pull_request.number || '' }}
      pr-action: ${{ github.event.action || '' }}
    secrets: inherit

  notify-infra-closed:
    name: Notify Infrastructure (PR closed)
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: tmlmobilidade/go-infra
          event-type: preview-pr
          client-payload: >-
            {
              "pr_number": ${{ github.event.pull_request.number }},
              "pr_action": "${{ github.event.action }}"
            }
