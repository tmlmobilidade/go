name: "Environment Sync | Daily Sync"

on:
  schedule:
    - cron: "0 1 * * *" # Daily at 01:00 UTC
  workflow_dispatch:

jobs:
  sync-environments:
    name: Sync Production to Staging
    runs-on: ubuntu-latest

    steps:
      # # # # # # # # # # # # # # # # # # # # #
      # Checkout + Node Setup
      # # # # # # # # # # # # # # # # # # # # #
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # # # # # # # # # # # # # # # # # # # # #
      # System tools
      # # # # # # # # # # # # # # # # # # # # #
      - name: Install MongoDB Tools
        run: |
          curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg

          echo "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg] \
            https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" \
            | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list

          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      # # # # # # # # # # # # # # # # # # # # #
      # Install dependencies + Build CLI
      # # # # # # # # # # # # # # # # # # # # #
      - name: Install dependencies
        run: npm install

      - name: Build env-sync CLI
        working-directory: ./cli/env-sync
        run: npm run build

      # # # # # # # # # # # # # # # # # # # # #
      # Secrets / Environment Setup
      # # # # # # # # # # # # # # # # # # # # #
      - name: Configure Secrets (.env + key file)
        working-directory: ./cli/env-sync
        run: |
          mkdir -p secrets

          # Write OCI private key
          echo "${{ secrets.OCI_KEY_FILE_CONTENT }}" > oci_key.pem
          chmod 600 oci_key.pem

          # Write .env and patch OCI_KEY_FILE to absolute path
          ABS_KEY="$(pwd)/oci_key.pem"
          echo "${{ secrets.ENV_SYNC_ENV }}" > .env
          chmod 600 .env

          # Ensure OCI_KEY_FILE is correctly set
          if grep -q "^OCI_KEY_FILE=" .env; then
            sed -i "s|^OCI_KEY_FILE=.*|OCI_KEY_FILE=${ABS_KEY}|" .env
          else
            echo "OCI_KEY_FILE=${ABS_KEY}" >> .env
          fi

      - name: Verify .env configuration
        uses: ./.github/actions/verify-env
        with:
          env-path: ./cli/env-sync/.env
          required-vars: |
            OCI_KEY_FILE
            OCI_COMPARTMENT
            OCI_FINGERPRINT
            OCI_NAMESPACE
            OCI_REGION
            OCI_TENANCY
            OCI_USER
            STORAGE_SOURCE
            STORAGE_DEST
            STORAGE_REMOTE_NAME
            STORAGE_TYPE
            PROD_HOST
            PROD_USERNAME
            PROD_PASSWORD
            PROD_AUTH_DATABASE
            PROD_DB
            STAGING_HOST
            STAGING_USERNAME
            STAGING_PASSWORD
            STAGING_AUTH_DATABASE
            STAGING_DB
            EXCLUDE_COLLECTIONS

      # # # # # # # # # # # # # # # # # # # # #
      # Run Sync
      # # # # # # # # # # # # # # # # # # # # #
      - name: Run Environment Sync
        working-directory: ./cli/env-sync
        run: |
          set -e
          echo "Running DB sync..."
          node dist/index.js --verbose --db-only

          echo "Running Storage sync..."
          node dist/index.js --verbose --storage-only

      # # # # # # # # # # # # # # # # # # # # #
      # Upload artifacts
      # # # # # # # # # # # # # # # # # # # # #
      - name: Upload backup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-artifacts
          path: cli/env-sync/backups
          retention-days: 7
          if-no-files-found: ignore