<!DOCTYPE html>
<html lang="en" data-mode="dark" data-theme="ocean">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Analyzer · Replay Viewer</title>

<link rel="stylesheet" href="../../../packages/ui/src/styles/system/reset.css" />
<link rel="stylesheet" href="../../../packages/ui/src/styles/system/color.css" />
<link rel="stylesheet" href="../../../packages/ui/src/styles/system/size.css" />
<link rel="stylesheet" href="../../../packages/ui/src/styles/system/font.css" />
<link rel="stylesheet" href="../../../packages/ui/src/styles/system/utils.css" />
<link rel="stylesheet" href="../../../packages/ui/src/styles/themes/ocean.css" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --bg0: var(--color-system-background-200, #1e1e28);
    --bg1: var(--color-system-background-100, #282832);
    --bg2: var(--color-system-background-300, #101018);
    --border: var(--color-system-border-100, #3c3c41);
    --text: var(--color-system-text-100, #ffffff);
    --text2: var(--color-system-text-200, #c8c8d2);
    --text3: var(--color-system-text-300, #9696a5);
    --accent: var(--color-primary, #2864B9);
    --accentText: var(--pill-1-text, #cde1ff);
    --ok: var(--color-status-success-primary, #329150);
    --warn: var(--color-status-warning-primary, #ff6a00);
    --danger: var(--color-status-danger-primary, #c83c3c);
  }

  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg0);
    color: var(--text);
    font-family: var(--font-family-default, sans-serif);
    font-size: 14px;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    overflow: hidden;
  }
  code {
    font-family: var(--font-family-monospace, monospace);
    font-size: 12px;
  }
  .mono {
    font-family: var(--font-family-monospace, monospace);
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg1);
  }
  .brand h1 {
    margin: 0;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand p {
    margin: 2px 0 0;
    color: var(--text3);
    font-size: 12px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .header-fill { flex: 1; }
  .meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .chip {
    border: 1px solid var(--border);
    background: var(--bg0);
    border-radius: 999px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text2);
  }
  .btn {
    border: 1px solid var(--border);
    background: var(--bg1);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .ribbon {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg0);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .stage {
    min-width: 130px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    background: var(--bg1);
  }
  .stage .k {
    color: var(--text3);
    font-size: 10px;
    text-transform: uppercase;
  }
  .stage .v {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.1;
    margin-top: 2px;
  }
  .stage .d {
    color: var(--text3);
    font-size: 11px;
    margin-top: 2px;
  }

  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
    min-height: 0;
    min-width: 0;
    overflow: hidden;
  }
  #map {
    background: var(--bg2);
    min-height: 0;
    min-width: 0;
  }
  aside {
    border-left: 1px solid var(--border);
    overflow: auto;
    background: var(--bg0);
    min-height: 0;
    min-width: 0;
  }
  .panel {
    border-bottom: 1px solid var(--border);
  }
  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 700;
  }
  .panel-head:hover { background: var(--bg1); }
  .panel-body { padding: 0 12px 12px; }
  .panel.collapsed .panel-body { display: none; }

  .kv {
    display: grid;
    grid-template-columns: 118px 1fr;
    gap: 6px;
    font-size: 12px;
    padding: 5px 0;
    border-top: 1px solid var(--border);
  }
  .kv:first-child { border-top: none; }
  .kv .k { color: var(--text3); }
  .kv .v {
    color: var(--text);
    min-width: 0;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th, td {
    border-top: 1px solid var(--border);
    padding: 6px 4px;
    text-align: left;
    vertical-align: top;
  }
  th {
    color: var(--text3);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  tbody tr:hover {
    background: #ffffff0d;
  }
  .eta-late { color: var(--danger); }
  .eta-early { color: var(--ok); }
  .eta-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  footer {
    border-top: 1px solid var(--border);
    background: var(--bg0);
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    min-width: 0;
    max-height: 140px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .stepper {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .stepper button {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    background: var(--bg1);
    cursor: pointer;
    font-size: 14px;
  }
  .stepper button:hover { border-color: var(--accent); }
  .strip {
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    gap: 6px;
    padding-bottom: 2px;
    align-items: stretch;
  }
  .ev {
    flex: 0 0 auto;
    min-width: 110px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--ok);
    border-radius: 8px;
    background: var(--bg1);
    padding: 6px 8px;
    cursor: pointer;
  }
  .ev.bad { border-left-color: var(--warn); }
  .ev.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .ev .id {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .ev .m {
    margin-top: 2px;
    color: var(--text3);
    font-size: 11px;
  }

  .leaflet-container { background: var(--bg2); }
  .leaflet-popup-content-wrapper {
    background: var(--bg1);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .leaflet-popup-tip {
    background: var(--bg1);
    border: 1px solid var(--border);
  }
  .leaflet-control-attribution {
    background: var(--bg1) !important;
    color: var(--text3) !important;
    font-size: 10px !important;
  }

  .empty {
    padding: 20px;
    color: var(--text2);
    font-size: 13px;
  }
  .error {
    color: #ffd2d2;
    background: #6b2525;
    border: 1px solid #a94949;
    border-radius: 8px;
    padding: 10px;
    margin: 10px 12px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1><span class="dot"></span> Ride Analyzer Replay Viewer</h1>
    <p id="subtitle">Loading run...</p>
  </div>
  <div class="header-fill"></div>
  <div class="meta" id="meta"></div>
  <button class="btn" id="btn-fit" type="button">Fit</button>
  <button class="btn" id="btn-mode" type="button">Light</button>
</header>

<div class="ribbon" id="ribbon"></div>

<main>
  <div id="map"></div>
  <aside>
    <div class="panel" id="panel-event">
      <div class="panel-head">Event <span>▾</span></div>
      <div class="panel-body" id="event-card"></div>
    </div>
    <div class="panel" id="panel-snap">
      <div class="panel-head">Snap <span>▾</span></div>
      <div class="panel-body" id="snap-card"></div>
    </div>
    <div class="panel" id="panel-etas">
      <div class="panel-head">ETAs <span>▾</span></div>
      <div class="panel-body">
        <div id="eta-summary" style="margin-bottom:8px;color:var(--text2);font-size:12px"></div>
        <table>
          <thead>
            <tr>
              <th>Stop</th>
              <th>Sched</th>
              <th>Est</th>
              <th>Delta</th>
            </tr>
          </thead>
          <tbody id="eta-rows"></tbody>
        </table>
        <button class="btn" id="btn-more-etas" type="button" style="margin-top:8px;display:none">Show all</button>
      </div>
    </div>
    <div id="error-box"></div>
  </aside>
</main>

<footer>
  <div class="stepper">
    <button id="btn-prev" type="button" title="Previous event">←</button>
    <button id="btn-next" type="button" title="Next event">→</button>
  </div>
  <div class="strip" id="strip"></div>
</footer>

<script>
const state = {
  summary: null,
  route: [],
  stops: [],
  snapshots: [],
  routeByIndex: new Map(),
  selected: 0,
  showAllEtas: false,
  stopMarkers: new Map(),
  map: null,
  layers: {},
  base: {},
  mode: 'dark',
};

function esc(text) {
  return String(text ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function formatMs(ms) {
  if (ms == null) return '-';
  const d = new Date(Number(ms));
  if (Number.isNaN(d.getTime())) return '-';
  return d.toISOString().replace('T', ' ').slice(0, 19);
}

function formatSec(sec) {
  if (sec == null || Number.isNaN(Number(sec))) return '-';
  const n = Number(sec);
  const sign = n >= 0 ? '+' : '-';
  return sign + Math.abs(Math.round(n)) + 's';
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2
    + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function parseSourceBase() {
  const params = new URLSearchParams(location.search);
  const dir = params.get('dir');
  if (dir) return dir.endsWith('/') ? dir.slice(0, -1) : dir;
  const run = params.get('run');
  if (run) return `../.output/ride-analyzer/${run}`;
  const picked = prompt('Run id? (folder inside modules/eta/output/ride-analyzer)');
  if (!picked) throw new Error('No run selected.');
  return `../.output/ride-analyzer/${picked}`;
}

async function loadJson(path) {
  const res = await fetch(path);
  if (!res.ok) {
    throw new Error(`Failed to load ${path} (${res.status})`);
  }
  return res.json();
}

function initMap() {
  if (state.map) return;
  state.map = L.map('map', { zoomControl: true, attributionControl: true }).setView([38.75, -9.15], 13);
  state.base.dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20,
  });
  state.base.light = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 20,
  });
  state.base.dark.addTo(state.map);
  state.layers.route = L.layerGroup().addTo(state.map);
  state.layers.stops = L.layerGroup().addTo(state.map);
  state.layers.trail = L.layerGroup().addTo(state.map);
  state.layers.current = L.layerGroup().addTo(state.map);
}

function setMode(next) {
  state.mode = next;
  document.documentElement.setAttribute('data-mode', next);
  if (state.base.dark && state.base.light) {
    if (state.map.hasLayer(state.base.dark)) state.map.removeLayer(state.base.dark);
    if (state.map.hasLayer(state.base.light)) state.map.removeLayer(state.base.light);
    (next === 'dark' ? state.base.dark : state.base.light).addTo(state.map);
  }
  document.getElementById('btn-mode').textContent = next === 'dark' ? 'Light' : 'Dark';
}

function fitBounds() {
  const pts = [];
  for (const n of state.route) pts.push([n.latitude, n.longitude]);
  for (const s of state.stops) pts.push([s.stop_lat, s.stop_lon]);
  for (const snap of state.snapshots) pts.push([snap.event.latitude, snap.event.longitude]);
  if (pts.length > 1) state.map.fitBounds(L.latLngBounds(pts).pad(0.16));
}

function renderHeader() {
  const metadata = state.summary.metadata ?? {};
  const args = metadata.args ?? {};
  const tripRef = args.tripRef ?? {};
  document.getElementById('subtitle').textContent =
    `${tripRef.tripId ?? '-'} · ${tripRef.rideId ?? 'no ride-id'} · started ${metadata.startedAt ?? '-'}`;

  const meta = document.getElementById('meta');
  const chips = [
    `events ${metadata.eventCount ?? state.snapshots.length}`,
    `snapshots ${metadata.snapshotCount ?? state.snapshots.length}`,
    `nodes ${state.route.length}`,
    `stops ${state.stops.length}`,
  ];
  meta.innerHTML = chips.map(v => `<span class="chip mono">${esc(v)}</span>`).join('');
}

function renderRibbon() {
  const snapped = state.snapshots.filter(s => s.curr_vehicle_event !== null).length;
  const withEtas = state.snapshots.filter(s => (s.etas?.length ?? 0) > 0).length;
  const cards = [
    { k: 'events', v: state.snapshots.length, d: 'replayed rows' },
    { k: 'snapped', v: snapped, d: `${state.snapshots.length - snapped} missing` },
    { k: 'with etas', v: withEtas, d: `${state.snapshots.length - withEtas} empty` },
    { k: 'stops', v: state.stops.length, d: 'waypoints' },
  ];
  document.getElementById('ribbon').innerHTML = cards.map(c => `
    <div class="stage">
      <div class="k">${esc(c.k)}</div>
      <div class="v mono">${esc(c.v)}</div>
      <div class="d">${esc(c.d)}</div>
    </div>
  `).join('');
}

function drawStaticLayers() {
  const routeLayer = state.layers.route;
  const stopLayer = state.layers.stops;
  routeLayer.clearLayers();
  stopLayer.clearLayers();
  state.stopMarkers.clear();

  if (state.route.length > 1) {
    L.polyline(state.route.map(n => [n.latitude, n.longitude]), {
      color: '#9ec3ff',
      weight: 4,
      opacity: 0.55,
    }).addTo(routeLayer);
  }
  for (const n of state.route) {
    L.circleMarker([n.latitude, n.longitude], {
      radius: 2.2,
      color: '#9ec3ff',
      fillColor: '#9ec3ff',
      fillOpacity: 0.55,
      weight: 1,
    }).addTo(routeLayer);
  }
  for (const s of state.stops) {
    const marker = L.circleMarker([s.stop_lat, s.stop_lon], {
      radius: 5,
      color: '#ffd47a',
      fillColor: '#ffd47a',
      fillOpacity: 0.9,
      weight: 1.5,
    }).bindTooltip(`S${s.stop_sequence} · ${s.stop_name} · ${s.arrival_time}`, { direction: 'top' });
    marker.addTo(stopLayer);
    state.stopMarkers.set(String(s.stop_id), marker);
  }
}

function stepTo(index) {
  if (!state.snapshots.length) return;
  state.selected = Math.max(0, Math.min(state.snapshots.length - 1, index));
  state.showAllEtas = false;
  renderDynamicLayers();
  renderInspector();
  renderStrip();
}

function renderDynamicLayers() {
  const trail = state.layers.trail;
  const current = state.layers.current;
  trail.clearLayers();
  current.clearLayers();

  for (let i = 0; i <= state.selected; i++) {
    const snap = state.snapshots[i];
    const ev = snap.event;
    if (ev?.latitude == null || ev?.longitude == null) continue;
    const faded = i === state.selected ? 0.9 : 0.35;
    const color = snap.curr_vehicle_event ? '#3dc77a' : '#ff7d45';
    L.circleMarker([ev.latitude, ev.longitude], {
      radius: i === state.selected ? 7 : 4,
      color,
      fillColor: color,
      fillOpacity: faded,
      weight: 2,
    }).bindPopup(`<strong>Event ${i + 1}</strong><br/>${esc(ev._id)}<br/>${esc(formatMs(ev.created_at))}`)
      .addTo(i === state.selected ? current : trail);

    const nodeIdx = snap.curr_vehicle_event?.node_index;
    if (nodeIdx != null) {
      const node = state.routeByIndex.get(Number(nodeIdx));
      if (node) {
        L.polyline([[ev.latitude, ev.longitude], [node.latitude, node.longitude]], {
          color: i === state.selected ? '#8bc8ff' : '#8bc8ff66',
          weight: i === state.selected ? 2.2 : 1.4,
          dashArray: '4 5',
          opacity: i === state.selected ? 0.95 : 0.5,
        }).addTo(i === state.selected ? current : trail);
      }
    }
  }

  const selected = state.snapshots[state.selected];
  if (!selected) return;
  const ev = selected.event;
  const nodeIdx = selected.curr_vehicle_event?.node_index;
  const snappedNode = nodeIdx == null ? null : state.routeByIndex.get(Number(nodeIdx));
  if (snappedNode) {
    L.circleMarker([snappedNode.latitude, snappedNode.longitude], {
      radius: 8,
      color: '#dce8ff',
      fillColor: 'transparent',
      fillOpacity: 0,
      weight: 2,
    }).bindTooltip(`node ${nodeIdx}`, { direction: 'top' }).addTo(current);
    const dist = haversine(ev.latitude, ev.longitude, snappedNode.latitude, snappedNode.longitude);
    L.circle([ev.latitude, ev.longitude], {
      radius: 30,
      color: '#ff9b54',
      weight: 1.2,
      dashArray: '4 4',
      opacity: 0.7,
      fillOpacity: 0.06,
    }).bindTooltip(`distance=${dist.toFixed(1)} m (30m reference ring)`, { direction: 'top' }).addTo(current);
  }
}

function renderInspector() {
  const snap = state.snapshots[state.selected];
  const ev = snap?.event ?? {};
  const curr = snap?.curr_vehicle_event;
  const node = curr ? state.routeByIndex.get(Number(curr.node_index)) : null;
  const dist = node ? haversine(ev.latitude, ev.longitude, node.latitude, node.longitude) : null;

  document.getElementById('event-card').innerHTML = `
    <div class="kv"><div class="k">event index</div><div class="v mono">${state.selected + 1} / ${state.snapshots.length}</div></div>
    <div class="kv"><div class="k">event id</div><div class="v mono">${esc(ev._id ?? '-')}</div></div>
    <div class="kv"><div class="k">created_at</div><div class="v mono">${esc(formatMs(ev.created_at))}</div></div>
    <div class="kv"><div class="k">lat / lon</div><div class="v mono">${ev.latitude?.toFixed?.(6) ?? '-'}, ${ev.longitude?.toFixed?.(6) ?? '-'}</div></div>
    <div class="kv"><div class="k">speed / bearing</div><div class="v mono">${ev.speed ?? '-'} km/h · ${ev.bearing ?? '-'} deg</div></div>
  `;

  document.getElementById('snap-card').innerHTML = curr ? `
    <div class="kv"><div class="k">node index</div><div class="v mono">${curr.node_index}</div></div>
    <div class="kv"><div class="k">distance</div><div class="v mono">${dist == null ? '-' : dist.toFixed(1) + ' m'}</div></div>
    <div class="kv"><div class="k">position_created_at</div><div class="v mono">${esc(formatMs(curr.created_at))}</div></div>
    <div class="kv"><div class="k">vehicle id</div><div class="v mono">${esc(curr.vehicle_id ?? '-')}</div></div>
    <div class="kv"><div class="k">shape</div><div class="v mono">${esc((curr.hashed_shape_id ?? '').slice(0, 16))}...</div></div>
  ` : '<div class="empty">No row in curr_vehicle_events for this event.</div>';

  const etas = Array.isArray(snap?.etas) ? snap.etas.slice().sort((a, b) => a.stop_sequence - b.stop_sequence) : [];
  const showLimit = 8;
  const visible = state.showAllEtas ? etas : etas.slice(0, showLimit);
  const tbody = document.getElementById('eta-rows');
  const etaSummary = document.getElementById('eta-summary');
  const btnMore = document.getElementById('btn-more-etas');
  etaSummary.textContent = `${etas.length} ETA rows`;
  if (!etas.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No ETAs for this event.</td></tr>';
    btnMore.style.display = 'none';
    return;
  }

  tbody.innerHTML = visible.map(eta => {
    const delta = eta.estimated_arrival_unix != null && eta.scheduled_arrival_unix != null
      ? eta.estimated_arrival_unix - eta.scheduled_arrival_unix
      : null;
    const deltaCls = delta == null ? '' : delta >= 0 ? 'eta-late' : 'eta-early';
    return `<tr data-stop-id="${esc(eta.stop_id)}">
      <td><span class="eta-dot" style="background:#ffd47a"></span>${esc(eta.stop_sequence)} · ${esc(eta.stop_id)}</td>
      <td class="mono">${esc(eta.scheduled_arrival ?? '-')}</td>
      <td class="mono">${esc(eta.estimated_arrival ?? '-')}</td>
      <td class="mono ${deltaCls}">${esc(formatSec(delta))}</td>
    </tr>`;
  }).join('');

  for (const row of tbody.querySelectorAll('tr[data-stop-id]')) {
    const stopId = row.getAttribute('data-stop-id');
    row.addEventListener('mouseenter', () => {
      const marker = state.stopMarkers.get(stopId);
      if (!marker) return;
      marker.setStyle({ radius: 8, color: '#fff2b5', fillColor: '#fff2b5' });
      marker.openTooltip();
    });
    row.addEventListener('mouseleave', () => {
      const marker = state.stopMarkers.get(stopId);
      if (!marker) return;
      marker.setStyle({ radius: 5, color: '#ffd47a', fillColor: '#ffd47a' });
      marker.closeTooltip();
    });
  }

  if (etas.length > showLimit) {
    btnMore.style.display = 'inline-block';
    btnMore.textContent = state.showAllEtas ? 'Show less' : `Show all (${etas.length})`;
  } else {
    btnMore.style.display = 'none';
  }
}

function renderStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = state.snapshots.map((snap, idx) => {
    const node = snap.curr_vehicle_event?.node_index;
    const cls = `${snap.curr_vehicle_event ? '' : 'bad'} ${idx === state.selected ? 'selected' : ''}`;
    return `<div class="ev ${cls}" data-idx="${idx}">
      <div class="id mono">E${idx + 1}</div>
      <div class="m mono">n${node ?? '-'} · ${esc(formatMs(snap.event.created_at).slice(11, 19))}</div>
    </div>`;
  }).join('');
  for (const node of strip.querySelectorAll('.ev')) {
    node.addEventListener('click', () => stepTo(Number(node.getAttribute('data-idx'))));
  }
}

function bindUi() {
  document.getElementById('btn-prev').addEventListener('click', () => stepTo(state.selected - 1));
  document.getElementById('btn-next').addEventListener('click', () => stepTo(state.selected + 1));
  document.getElementById('btn-fit').addEventListener('click', fitBounds);
  document.getElementById('btn-mode').addEventListener('click', () => setMode(state.mode === 'dark' ? 'light' : 'dark'));
  document.getElementById('btn-more-etas').addEventListener('click', () => {
    state.showAllEtas = !state.showAllEtas;
    renderInspector();
  });

  for (const panel of document.querySelectorAll('.panel')) {
    const head = panel.querySelector('.panel-head');
    head.addEventListener('click', () => panel.classList.toggle('collapsed'));
  }

  document.addEventListener('keydown', ev => {
    if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'TEXTAREA') return;
    if (ev.key === 'ArrowLeft') { stepTo(state.selected - 1); ev.preventDefault(); }
    if (ev.key === 'ArrowRight') { stepTo(state.selected + 1); ev.preventDefault(); }
    if (ev.key === 'f') { fitBounds(); }
    if (ev.key === 'm') { setMode(state.mode === 'dark' ? 'light' : 'dark'); }
    if (ev.key === '[') { for (const p of document.querySelectorAll('.panel')) p.classList.add('collapsed'); }
    if (ev.key === ']') { for (const p of document.querySelectorAll('.panel')) p.classList.remove('collapsed'); }
  });
}

function showError(message) {
  const box = document.getElementById('error-box');
  box.innerHTML = `<div class="error">${esc(message)}</div>`;
}

async function boot() {
  try {
    bindUi();
    initMap();
    setMode('dark');

    const base = parseSourceBase();
    const [summary, route, stops] = await Promise.all([
      loadJson(`${base}/summary.json`),
      loadJson(`${base}/route.json`),
      loadJson(`${base}/stops.json`),
    ]);

    state.summary = summary;
    state.route = Array.isArray(route) ? route : [];
    state.stops = Array.isArray(stops) ? stops : [];
    state.snapshots = Array.isArray(summary?.snapshots) ? summary.snapshots : [];
    state.routeByIndex = new Map(state.route.map(n => [Number(n.node_index), n]));

    renderHeader();
    renderRibbon();
    drawStaticLayers();
    fitBounds();
    stepTo(0);
  } catch (error) {
    const help = [
      `Load error: ${error?.message ?? String(error)}`,
      '',
      'Expected:',
      '- summary.json',
      '- route.json',
      '- stops.json',
      '',
      'Open with:',
      'http://localhost:8080/docs/ride-analyzer.html?run=<run-id>',
      'and serve modules/eta via static server.',
    ].join('\\n');
    showError(help);
    console.error(error);
  }
}

boot();
</script>
</body>
</html>
