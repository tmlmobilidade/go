# # #

name: 'All Modules | Build & Test'

# # #

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - staging
      - 'staging/**'
    paths:
      - 'modules/**'
      - '!modules/*/environments/**'
      - 'packages/**'
      - '.github/workflows/build-all-modules.yml'

# # #

jobs:

  discover-apps:
    name: Discover Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-matrix.outputs.apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover all apps with Dockerfiles
        id: set-matrix
        run: |
          APPS_ARRAY=()
          
          echo "Discovering all apps (building all)"
          
          for module_dir in modules/*/; do
            module=$(basename "$module_dir")
            for app_dir in "${module_dir}apps"/*/; do
              if [ -f "${app_dir}Dockerfile" ]; then
                app=$(basename "$app_dir")
                echo "Including ${module}|${app}"
                APPS_ARRAY+=("${module}|${app}")
              fi
            done
          done
          
          if [ ${#APPS_ARRAY[@]} -eq 0 ]; then
            echo "No apps to build"
            APPS="[]"
          else
            APPS=$(printf '%s\n' "${APPS_ARRAY[@]}" | jq -R . | jq -s -c .)
          fi
          
          {
            echo "apps<<EOF"
            echo "$APPS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Apps to build: $APPS"

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build-packages:
    name: Build Packages Cache
    needs: discover-apps
    if: needs.discover-apps.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Turbo
        run: npm install -g turbo@^2

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Cache Turbo build cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-packages-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            turbo-packages-${{ runner.os }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build:packages

      - name: Cache package-lock.json
        uses: actions/cache@v4
        with:
          path: package-lock.json
          key: package-lock-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            package-lock-${{ runner.os }}-

      - name: Save package-lock.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-lock.json
          path: package-lock.json
          retention-days: 1

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build:
    name: Build ${{ matrix.app }}
    needs: [discover-apps, build-packages]
    if: needs.discover-apps.outputs.apps != '[]'
    continue-on-error: false
    runs-on: ubuntu-latest
    concurrency:
      group: build-all-modules-${{ matrix.app }}
      cancel-in-progress: false
    permissions:
      contents: read
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse module and app
        id: parse
        run: |
          IFS='|' read -r module app <<< "${{ matrix.app }}"
          echo "module=$module" >> $GITHUB_OUTPUT
          echo "app=$app" >> $GITHUB_OUTPUT
          
          # Determine Dockerfile template based on app type and module
          if [ "$module" = "gateway" ] && [ "$app" = "nginx" ]; then
            DOCKERFILE=".github/docker/gateway-nginx.dockerfile"
          elif [ "$app" = "frontend" ]; then
            DOCKERFILE=".github/docker/frontend.dockerfile"
          elif [ "$app" = "nginx" ]; then
            DOCKERFILE=".github/docker/nginx.dockerfile"
          else
            DOCKERFILE=".github/docker/nodejs.dockerfile"
          fi
          
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "Parsed: module=$module, app=$app, dockerfile=$DOCKERFILE"

      - name: Restore package-lock.json
        uses: actions/cache@v4
        with:
          path: package-lock.json
          key: package-lock-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            package-lock-${{ runner.os }}-

      - name: Download package-lock.json artifact
        uses: actions/download-artifact@v4
        with:
          name: package-lock.json
          path: .
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Turbo build cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            turbo-packages-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
            turbo-packages-${{ runner.os }}-
            turbo-${{ runner.os }}-

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.parse.outputs.dockerfile }}
          push: false
          tags: ghcr.io/tmlmobilidade/go-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}:${{ github.ref_name }}
          build-args: |
            MODULE=${{ steps.parse.outputs.module }}
            APP=${{ steps.parse.outputs.app }}
            ENVIRONMENT=${{ github.ref_name }}
            NGINX_SERVER_NAME=${{ github.ref_name == 'staging' && 'staging.go.tmlmobilidade.pt' || 'go.tmlmobilidade.pt' }}
          cache-from: |
            type=gha
          cache-to: |
            type=gha,mode=max
          outputs: type=docker,dest=/tmp/image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}.tar

      - name: Save Docker Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}
          path: /tmp/image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}.tar
          retention-days: 1


  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  publish:
    name: Publish ${{ matrix.app }}
    needs: [discover-apps, build]
    if: needs.discover-apps.outputs.apps != '[]' && success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse module and app
        id: parse
        run: |
          IFS='|' read -r module app <<< "${{ matrix.app }}"
          echo "module=$module" >> $GITHUB_OUTPUT
          echo "app=$app" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}

      - name: Load Docker Image
        run: |
          docker load -i image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}.tar

      - name: Push Docker Image
        run: |
          docker push ghcr.io/tmlmobilidade/go-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}:${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  cleanup:
    name: Cleanup on Failure
    needs: [discover-apps, build, publish]
    if: always() && needs.discover-apps.outputs.apps != '[]' && (needs.build.result == 'failure' || needs.publish.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse module and app
        id: parse
        run: |
          IFS='|' read -r module app <<< "${{ matrix.app }}"
          echo "module=$module" >> $GITHUB_OUTPUT
          echo "app=$app" >> $GITHUB_OUTPUT

      - name: Delete Published Images
        if: needs.publish.result == 'failure'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="go-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}"
          TAG="${{ github.ref_name }}"
          echo "Attempting to delete published image: $PACKAGE_NAME:$TAG"
          
          # Get the version ID for the tag
          VERSION_ID=$(gh api "/orgs/tmlmobilidade/packages/container/$PACKAGE_NAME/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"$TAG\") | .id" | head -n1)
          
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting version $VERSION_ID of package $PACKAGE_NAME"
            gh api --method DELETE "/orgs/tmlmobilidade/packages/container/$PACKAGE_NAME/versions/$VERSION_ID" \
              || echo "Warning: Failed to delete image version (may have been already deleted)"
          else
            echo "No version found with tag $TAG, skipping deletion"
          fi

      - name: Delete Artifacts
        continue-on-error: true
        uses: geekyeggo/delete-artifact@v5
        with:
          name: docker-image-${{ steps.parse.outputs.module }}-${{ steps.parse.outputs.app }}

