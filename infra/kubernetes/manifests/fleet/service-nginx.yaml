apiVersion: v1
kind: Service
metadata:
  name: fleet-nginx
  namespace: go-fleet
  labels:
    app: fleet-nginx
    app.kubernetes.io/name: fleet-nginx
    app.kubernetes.io/part-of: go-fleet
spec:
  # NodePort: the nginx proxy VM in pub-go forwards external traffic to this port.
  type: NodePort
  selector:
    app: fleet-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30084
      protocol: TCP
