---
apiVersion: v1
kind: Namespace
metadata:
  name: ${NAMESPACE}
  labels:
    preview: "true"
    branch: ${BRANCH_NAME}
    module: ${MODULE}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MODULE}-frontend
  namespace: ${NAMESPACE}
  labels:
    app: ${MODULE}-frontend
    preview: "true"
    branch: ${BRANCH_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${MODULE}-frontend
  template:
    metadata:
      labels:
        app: ${MODULE}-frontend
        preview: "true"
        branch: ${BRANCH_NAME}
    spec:
      containers:
      - name: frontend
        image: ghcr.io/tmlmobilidade/go-${MODULE}-frontend:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT
          value: "preview"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MODULE}-api
  namespace: ${NAMESPACE}
  labels:
    app: ${MODULE}-api
    preview: "true"
    branch: ${BRANCH_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${MODULE}-api
  template:
    metadata:
      labels:
        app: ${MODULE}-api
        preview: "true"
        branch: ${BRANCH_NAME}
    spec:
      containers:
      - name: api
        image: ghcr.io/tmlmobilidade/go-${MODULE}-api:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT
          value: "preview"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${MODULE}-nginx
  namespace: ${NAMESPACE}
  labels:
    app: ${MODULE}-nginx
    preview: "true"
    branch: ${BRANCH_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${MODULE}-nginx
  template:
    metadata:
      labels:
        app: ${MODULE}-nginx
        preview: "true"
        branch: ${BRANCH_NAME}
    spec:
      containers:
      - name: nginx
        image: ghcr.io/tmlmobilidade/go-${MODULE}-nginx:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        env:
        - name: NGINX_SERVER_NAME
          value: "${BRANCH_NAME}-${MODULE}.${BASE_DOMAIN}"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: ${MODULE}-frontend
  namespace: ${NAMESPACE}
spec:
  selector:
    app: ${MODULE}-frontend
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ${MODULE}-api
  namespace: ${NAMESPACE}
spec:
  selector:
    app: ${MODULE}-api
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ${MODULE}-nginx
  namespace: ${NAMESPACE}
spec:
  selector:
    app: ${MODULE}-nginx
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${MODULE}-ingress
  namespace: ${NAMESPACE}
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Adjust based on your cert-manager setup
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ${BRANCH_NAME}-${MODULE}.${BASE_DOMAIN}
    secretName: ${MODULE}-tls-secret
  rules:
  - host: ${BRANCH_NAME}-${MODULE}.${BASE_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${MODULE}-nginx
            port:
              number: 80