apiVersion: v1
kind: Service
metadata:
  # Name must match the upstream in the baked-in nginx config: "server frontend:3000"
  name: frontend
  namespace: go-fleet
  labels:
    app: fleet-frontend
    app.kubernetes.io/name: fleet-frontend
    app.kubernetes.io/part-of: go-fleet
spec:
  type: ClusterIP
  selector:
    app: fleet-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
