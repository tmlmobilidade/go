name: PR Comment Bot

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  comment:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: modules
          sparse-checkout-cone-mode: false

      - name: List buildable modules
        id: modules
        shell: bash
        run: |
          MODULES=$(ls -1 modules | sort)
          {
            echo "list<<EOF"
            echo "$MODULES" | sed 's/^/- `/' | sed 's/$/`/'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR environment and builds
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const moduleList = `${{ steps.modules.outputs.list }}`.trim();

            const body = [
              `Behold! Your PR has ascended to its own environment:`,
              '',
              `https://pr-${prNumber}.go-stg.tmlmobilidade.pt/`,
              '',
              'Test wisely, deploy bravely.',
              '',
              '---',
              '',
              '### Build modules on demand',
              '',
              'Comment on this PR to build a single module (images tagged `pr-' + prNumber + '`):',
              '',
              '```',
              '/build <module>',
              '```',
              '',
              '**Available modules:**',
              moduleList,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
