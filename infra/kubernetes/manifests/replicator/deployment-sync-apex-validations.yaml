apiVersion: apps/v1
kind: Deployment
metadata:
  name: replicator-sync-apex-validations
  namespace: go-replicator
  labels:
    app: replicator-sync-apex-validations
    app.kubernetes.io/name: replicator-sync-apex-validations
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: go-replicator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: replicator-sync-apex-validations
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: replicator-sync-apex-validations
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: sync-apex-validations
          image: ghcr.io/tmlmobilidade/go-replicator-sync-apex-validations:k8s
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: replicator-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
