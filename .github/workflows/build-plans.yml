name: 'Plans | Build & Push'

on:
  workflow_dispatch:
  push:
    paths:
      - 'plans/**'
    branches:
      - production
      - staging
      
# # #

jobs:

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  frontend:
    name: frontend (NextJS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@master
        with:
          push: true
          context: ./plans
          file: ./plans/apps/frontend/Dockerfile
          tags: ghcr.io/tmlmobilidade/sae-plans-frontend:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_AUTH_URL=${{ github.ref_name == 'staging' && 'https://auth.sae.carrismetropolitana.pt' || 'https://auth.sae.carrismetropolitana.pt' }}
            NEXT_PUBLIC_URL=${{ github.ref_name == 'staging' && 'https://staging.plans.sae.carrismetropolitana.pt' || 'https://plans.sae.carrismetropolitana.pt' }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  api:
    name: api (NodeJS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@master
        with:
          push: true
          context: ./plans
          file: ./plans/apps/api/Dockerfile
          tags: ghcr.io/tmlmobilidade/sae-plans-api:${{ github.ref_name }}
  
          # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  validator:
    name: validator (NodeJS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@master
        with:
          push: true
          context: ./plans
          file: ./plans/apps/validator/Dockerfile
          tags: ghcr.io/tmlmobilidade/sae-plans-validator:${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # #

  nginx:
    name: nginx
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@master
        with:
          push: true
          context: ./plans/apps/nginx
          file: ./plans/apps/nginx/Dockerfile
          tags: ghcr.io/tmlmobilidade/sae-plans-nginx:${{ github.ref_name }}
          build-args: |
            NGINX_SERVER_NAME=${{ github.ref_name == 'staging' && 'staging.plans.sae.carrismetropolitana.pt' || 'plans.sae.carrismetropolitana.pt' }}