name: "Discover Modules"
description: "Discovers which modules and apps to build based on changed files"

inputs:
  modules-apps:
    description: "Newline-separated list of modules and their apps (format: module:app, one app per line)"
    required: true
  fetch-depth:
    description: "Depth to fetch when checking out repository"
    required: false
    default: "2"

outputs:
  modules:
    description: "JSON array of module names to build"
    value: ${{ steps.discover.outputs.modules }}
  modules-apps:
    description: "JSON object mapping module names to their apps"
    value: ${{ steps.discover.outputs.modules-apps }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: ${{ github.event_name == 'push' && '0' || inputs.fetch-depth }}

    - name: Get changed files
      id: changed
      uses: tj-actions/changed-files@v45
      with:
        files: |
          modules/**
          packages/**
        base_sha: ${{ github.event.before || github.event.pull_request.base.sha || '' }}
        sha: ${{ github.sha }}
        include_all_old_new_renamed_files: true

    - name: Get deleted files via git diff
      id: git-diff
      shell: bash
      run: |
        BASE_SHA="${{ github.event.before || github.event.pull_request.base.sha || '' }}"
        CURRENT_SHA="${{ github.sha }}"

        # Get all changed files including deletions (A=Added, M=Modified, D=Deleted, R=Renamed)
        # Use git diff to ensure deleted files are captured
        if [ -n "$BASE_SHA" ]; then
          CHANGED=$(git diff --name-only --diff-filter=AMDR ${BASE_SHA} ${CURRENT_SHA} 2>/dev/null | grep -E '^(modules|packages)/' || true)
        else
          # If no base SHA, compare with HEAD (for initial commits or manual runs)
          CHANGED=$(git diff --name-only --diff-filter=AMDR HEAD ${CURRENT_SHA} 2>/dev/null | grep -E '^(modules|packages)/' || true)
        fi

        if [ -n "$CHANGED" ]; then
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "changed_files=" >> $GITHUB_OUTPUT
        fi

    - name: Discover modules and apps
      id: discover
      uses: actions/github-script@v8
      env:
        MODULES_APPS: ${{ inputs.modules-apps }}
        CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        GIT_DIFF_FILES: ${{ steps.git-diff.outputs.changed_files }}
      with:
        script: |
          // Parse one app per line format: module:app
          const moduleAppsMap = {};
          process.env.MODULES_APPS
            .split('\n')
            .filter(Boolean)
            .forEach(line => {
              const [module, app] = line.split(':').map(s => s.trim());
              if (module && app) {
                if (!moduleAppsMap[module]) {
                  moduleAppsMap[module] = [];
                }
                moduleAppsMap[module].push(app);
              }
            });

          const allModules = Object.entries(moduleAppsMap).map(([module, apps]) => ({
            module,
            apps
          }));

          // Parse changed files from tj-actions/changed-files (newline-separated string)
          const changedFilesFromAction = (process.env.CHANGED_FILES || '')
            .split('\n')
            .filter(Boolean);

          // Parse changed files from git diff (includes deletions)
          const changedFilesFromGit = (process.env.GIT_DIFF_FILES || '')
            .split('\n')
            .filter(Boolean);

          // Combine both sources and deduplicate
          const changedFilesSet = new Set([
            ...changedFilesFromAction,
            ...changedFilesFromGit
          ]);
          const changedFiles = Array.from(changedFilesSet);

          const isManual = context.eventName === 'workflow_dispatch';
          const buildAll = isManual || changedFiles.some(f => f.startsWith('packages/'));

          const modulesToBuild = [];
          const moduleApps = {};

          for (const { module, apps } of allModules) {
            if (buildAll) {
              modulesToBuild.push(module);
              moduleApps[module] = apps;
            } else {
              const changed = changedFiles.some(f =>
                f.startsWith(`modules/${module}/`) && !f.includes('environments/')
              );
              if (changed) {
                modulesToBuild.push(module);
                moduleApps[module] = apps;
              }
            }
          }

          core.setOutput('modules', JSON.stringify(modulesToBuild));
          core.setOutput('modules-apps', JSON.stringify(moduleApps));

          console.log('Modules to build:', modulesToBuild);
          console.log('Modules and apps:', moduleApps);

