name: PR Module Build

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to build'
        required: true
        type: string
      module:
        description: 'Module to build (e.g. auth)'
        required: true
        type: string

permissions:
  actions: write
  pull-requests: write
  issues: write

jobs:
  build:
    if: |
      (github.event_name == 'pull_request' && startsWith(github.event.label.name, 'build-')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve build target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "module=${{ inputs.module }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            LABEL="${{ github.event.label.name }}"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "module=${LABEL#build-}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch module build
        uses: actions/github-script@v7
        with:
          script: |
            const module = `${{ steps.target.outputs.module }}`.trim();
            const prNumber = Number(`${{ steps.target.outputs.pr_number }}`);
            const ref = `${{ steps.target.outputs.ref }}`.trim();

            if (!module) {
              core.setFailed('Usage: /build <module> or label build-<module>');
              return;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-modules.yml',
              ref,
              inputs: {
                module,
                build_all: 'false',
                pr_number: String(prNumber),
              },
            });

            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `Build started for \`${module}\`. Remove and re-add label \`build-${module}\` to rebuild.`,
              });
            }
