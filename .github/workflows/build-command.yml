name: PR Module Build

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to build'
        required: true
        type: string
      module:
        description: 'Module(s) to build — space or comma separated, or "all"'
        required: true
        type: string

permissions:
  actions: write
  pull-requests: write
  issues: write

jobs:
  build:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/build') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch module build
        uses: actions/github-script@v7
        with:
          script: |
            const isManual = context.eventName === 'workflow_dispatch';
            const args = isManual
              ? context.payload.inputs.module.trim()
              : context.payload.comment.body.replace(/^\/build\s*/i, '').trim();
            const prNumber = isManual
              ? Number(context.payload.inputs.pr_number)
              : context.issue.number;

            if (!args) {
              core.setFailed('Usage: /build <module> or /build <module> <module> or /build all');
              return;
            }

            const buildAll = args.toLowerCase() === 'all';
            const modules = buildAll
              ? ['all']
              : args.split(/[\s,]+/).map(name => name.trim()).filter(Boolean);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            for (const module of modules) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build-modules.yml',
                ref: pr.head.ref,
                inputs: {
                  module,
                  build_all: buildAll ? 'true' : 'false',
                  pr_number: String(prNumber),
                },
              });
            }

            if (!isManual) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket',
              });

              const label = buildAll ? 'all modules' : modules.map(name => `\`${name}\``).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `Build started for ${label}.`,
              });
            }
