# # #

services:

  mongodb:
    image: mongo:latest
    restart: unless-stopped
    network_mode: host
    command: >
      mongod
        --auth
        --replSet rs0
        --bind_ip_all
        --oplogSize 100000
        --keyFile /data/replica.key
    deploy:
      resources:
        limits:
          memory: 10gb
    logging:
      options:
        max-size: '1m'
        max-file: '1'
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    volumes:
      - /opt/app/persistent-data/data:/data/db
      - /opt/app/persistent-data/logs:/var/log/mongodb
      - /opt/app/persistent-data/replica.key:/data/replica.key:ro
    env_file:
      - /opt/app/secrets/.env