name: PR Comment Bot

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
      - name: Comment PR environment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: contents } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'modules',
              ref: context.payload.pull_request.head.ref,
            });

            const moduleList = contents
              .filter((item) => item.type === 'dir')
              .map((item) => `- \`${item.name}\``)
              .sort()
              .join('\n');

            const body = [
              '### Builds',
              '',
              'PRs do not auto-build on push. Comment to build — each module runs as a separate workflow:',
              '```',
              '/build <module> [module...]',
              '/build all',
              '```',
              '',
              'Example: `/build stops`',
              '',
              '**Available modules:**',
              moduleList,
              '',
              '---',
              '',
              '### Environment (after `/build`)',
              '',
              `https://pr-${prNumber}.go-stg.tmlmobilidade.pt/`,
              '',
              'Test wisely, deploy bravely'
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
