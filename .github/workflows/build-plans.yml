name: 'Plans | Build & Push'

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - staging
    paths:
      - '!modules/plans/environments/**'
      - 'modules/plans/**'
      - 'packages/**'
      - '.github/workflows/build-plans.yml'

# # #

jobs:

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  # Build packages once and cache them
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages image (for caching)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/dockerfiles/packages.Dockerfile
          push: false
          cache-from: type=registry,ref=ghcr.io/tmlmobilidade/go-plans-packages:cache
          cache-to: type=registry,ref=ghcr.io/tmlmobilidade/go-plans-packages:cache,mode=max
          tags: ghcr.io/tmlmobilidade/go-plans-packages:cache
          outputs: type=cache,dest=/tmp/.buildx-cache

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  frontend:
    name: frontend (NextJS)
    needs: build-packages
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/plans/apps/frontend/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-plans-frontend:${{ github.ref_name }}
      environment: ${{ github.ref_name }}
      cache-from: ghcr.io/tmlmobilidade/go-plans-packages:cache

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  api:
    name: api (NodeJS)
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/plans/apps/api/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-plans-api:${{ github.ref_name }}
      environment: ${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  validator:
    name: validator (NodeJS)
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/plans/apps/validator/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-plans-validator:${{ github.ref_name }}
      environment: ${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  cleaner:
    name: cleaner (NodeJS)
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/plans/apps/cleaner/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-plans-cleaner:${{ github.ref_name }}
      environment: ${{ github.ref_name }}


  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #
  
  nginx:
    name: nginx (NodeJS)
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/plans/apps/nginx/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-plans-nginx:${{ github.ref_name }}
      environment: ${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  export-drt:
    name: export-drt (NodeJS)
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/plans/apps/export-drt/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-plans-export-drt:${{ github.ref_name }}
      environment: ${{ github.ref_name }}