apiVersion: v1
kind: Service
metadata:
  name: ticketing-nginx
  namespace: go-ticketing
  labels:
    app: ticketing-nginx
    app.kubernetes.io/name: ticketing-nginx
    app.kubernetes.io/part-of: go-ticketing
spec:
  type: NodePort
  selector:
    app: ticketing-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30090
      protocol: TCP
