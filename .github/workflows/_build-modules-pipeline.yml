name: Build Modules Pipeline

on:
  workflow_call:
    inputs:
      selected-modules:
        description: Comma-separated modules; when set, only these build (skips diff discovery)
        type: string
        default: ''
      selected-module:
        description: Legacy workflow_dispatch single module (or "all")
        type: string
        default: 'all'
      build-all:
        description: Build every module when workflow_dispatch has no specific selection
        type: boolean
        default: true
      ref:
        description: Git ref to checkout (defaults to workflow SHA)
        type: string
        default: ''
      fetch-depth:
        description: Checkout fetch depth
        type: string
        default: '2'
      image-tag:
        description: Docker image tag
        required: true
        type: string
      environment:
        description: Build environment value
        required: true
        type: string
      notify-infra:
        description: Notify go-infra preview environment
        type: boolean
        default: false
      pr-number:
        description: Pull request number for infra dispatch
        type: string
        default: ''
      pr-action:
        description: Pull request action for infra dispatch
        type: string
        default: ''

jobs:
  discover:
    name: Discover Modules
    runs-on: ubuntu-24.04-arm
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      modules-apps: ${{ steps.discover.outputs.modules-apps }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: ${{ inputs.fetch-depth }}

      - id: scan
        shell: bash
        run: |
          MAPPING=$(find modules/*/apps/* -maxdepth 0 -type d | sort | sed 's|modules/||; s|/apps/|:|')
          {
            echo "modules-apps<<EOF"
            echo "$MAPPING"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - id: discover
        uses: ./.github/actions/discover-modules
        with:
          modules-apps: ${{ steps.scan.outputs.modules-apps }}
          selected-modules: ${{ inputs.selected-modules }}
          selected-module: ${{ inputs.selected-module }}
          build-all: ${{ inputs.build-all }}

  package-lock:
    name: Generate package-lock.json
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - run: npm install --package-lock-only --ignore-scripts

      - uses: actions/upload-artifact@v7
        with:
          name: package-lock
          path: package-lock.json
          retention-days: 1

  notify-infra:
    name: Notify Infrastructure
    needs: [package-lock]
    if: |
      inputs.notify-infra &&
      always() &&
      (inputs.pr-action == 'closed' || needs.package-lock.result == 'success')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: tmlmobilidade/go-infra
          event-type: preview-pr
          client-payload: >-
            {
              "pr_number": ${{ inputs.pr-number }},
              "pr_action": "${{ inputs.pr-action }}"
            }

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover, package-lock]
    if: needs.discover.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover.outputs.modules-apps }}
      image-tag: ${{ inputs.image-tag }}
      environment: ${{ inputs.environment }}
    secrets: inherit
