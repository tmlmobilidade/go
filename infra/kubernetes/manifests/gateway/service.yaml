apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: go-poc
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: go-poc
spec:
  # ClusterIP: internal-only service. External traffic is handled by the Ingress.
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
