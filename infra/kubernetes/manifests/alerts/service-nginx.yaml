apiVersion: v1
kind: Service
metadata:
  name: alerts-nginx
  namespace: go-alerts
  labels:
    app: alerts-nginx
    app.kubernetes.io/name: alerts-nginx
    app.kubernetes.io/part-of: go-alerts
spec:
  type: NodePort
  selector:
    app: alerts-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30088
      protocol: TCP
