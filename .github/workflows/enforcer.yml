name: Enforce staging-only PRs to production

on:
  pull_request:
    branches:
      - production

jobs:
  check_source_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR is from staging branch
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "❌ Pull requests to production must come from staging branch."
            exit 1
          fi
          echo "✅ PR source branch is staging."