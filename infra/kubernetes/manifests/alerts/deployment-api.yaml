apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerts-api
  namespace: go-alerts
  labels:
    app: alerts-api
    app.kubernetes.io/name: alerts-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: go-alerts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alerts-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: alerts-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [alerts-api]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: ghcr.io/tmlmobilidade/go-alerts-api:k8s
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5050
              protocol: TCP
          envFrom:
            - secretRef:
                name: alerts-secret
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
