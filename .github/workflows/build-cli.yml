name: 'Build CLI apps'

on:
  workflow_dispatch:
  push:
    branches:
      - prd
    paths:
      - 'cli/**'
      - 'packages/**'
      - '.github/workflows/build-cli.yml'
      - '.github/actions/**/*'
      - '.github/templates/**/*'

env:
  CLI_APPS: |
    backupd
    export-data
    generate-offer-files
    repo-rinse
    repo-version
    env-sync

jobs:

# =========================================================
# 1. MUTATE PACKAGE.JSON + UPDATE DEPENDENCIES
# =========================================================
  prepare-workspace:
    name: Prepare workspace (update deps)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Update package.json TML dependencies
        run: |
          while IFS= read -r cli_app; do
            echo "Processing $cli_app"

            node -e "
              const fs = require('fs');
              const path = \`cli/${cli_app}/package.json\`;

              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));

              for (const section of ['dependencies','devDependencies','peerDependencies']) {
                if (!pkg[section]) continue;

                for (const k of Object.keys(pkg[section])) {
                  if (pkg[section][k] === '*') {
                    pkg[section][k] = '0';
                  }
                }
              }

              fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
            "

            npx npm-check-updates \
              -u \
              --filter '^@tmlmobilidade/' \
              --packageFile="cli/${cli_app}/package.json"

          done <<< "${CLI_APPS}"

      - name: Upload modified workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

# =========================================================
# 2. VERSION GENERATION
# =========================================================
  version-number:
    name: Version Number
    runs-on: ubuntu-latest

    outputs:
      version_number: ${{ steps.gen.outputs.version_number }}

    steps:
      - id: gen
        run: |
          version="$(date +%Y%m%d).$(date +%H%M).$(date +%S)"
          echo "version_number=$version" >> "$GITHUB_OUTPUT"

# =========================================================
# 3. MATRIX PREPARATION
# =========================================================
  prepare-matrix:
    name: Prepare publish matrix
    runs-on: ubuntu-latest
    outputs:
      cli_apps: ${{ steps.matrix.outputs.cli_apps }}

    steps:
      - name: Generate matrix
        id: matrix
        run: |
          apps=$(printf '%s\n' "${CLI_APPS}" \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | sed '/^$/d' \
            | sed 's/.*/"&"/' \
            | paste -sd "," -)

          echo "cli_apps=[${apps}]" >> "$GITHUB_OUTPUT"

# =========================================================
# 4. PUBLISH
# =========================================================
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    needs: [prepare-matrix, version-number]

    strategy:
      fail-fast: false
      matrix:
        cli_app: ${{ fromJSON(needs.prepare-matrix.outputs.cli_apps) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download modified workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Install Turbo
        run: npm install -g turbo@^2

      - name: Install dependencies
        run: npm ci

      - name: Build CLI app
        run: turbo run build --filter=./cli/${{ matrix.cli_app }}

      - name: Bump version
        working-directory: cli/${{ matrix.cli_app }}
        run: npm version --no-git-tag-version ${{ needs.version-number.outputs.version_number }}

      - name: Publish package
        working-directory: cli/${{ matrix.cli_app }}
        run: npm publish --access public