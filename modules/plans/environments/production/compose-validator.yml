# # #

name: tmlmobilidade-sae-plans-validator

volumes:
  certbotdata:

services:
  #

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  wud:
    image: getwud/wud
    deploy:
      restart_policy:
        condition: any
        delay: 30s
      resources:
        limits:
          memory: 100mb
    logging:
      options:
        max-size: '1m'
        max-file: '1'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WUD_TRIGGER_DOCKER_DEFAULT_PRUNE=true
      - WUD_WATCHER_LOCAL_WATCHALL=true
      - WUD_WATCHER_LOCAL_CRON=* * * * *

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  validator:
    image: ghcr.io/tmlmobilidade/sae-plans-validator:production
    deploy:
      restart_policy:
        condition: on-failure
        delay: 30s
      resources:
        limits:
          memory: 14gb
    logging:
      options:
        max-size: '1m'
        max-file: '1'
    environment:
      - GOMEMLIMIT=14GiB
    volumes:
      - ./secrets:/secrets
    env_file:
      - ./secrets/.env