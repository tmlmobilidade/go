name: Build Modules

run-name: ${{ inputs.pr_number != '' && format('build-module-{0}', inputs.pr_number) || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module(s) to build — comma or space separated, or "all"'
        required: false
        default: 'all'
        type: string
      build_all:
        description: 'Build every module when no specific module is selected'
        required: false
        default: true
        type: boolean
      pr_number:
        description: 'PR number — sets image tag to pr-{N} when set (/build)'
        required: false
        type: string
  pull_request:
    types: [closed]
  push:
    branches:
      - prd
    paths:
      - 'modules/**'
      - 'packages/**'
      - 'packages-new/**'
      - '.github/workflows/build-modules.yml'
      - '.github/actions/**/*'
      - '.github/templates/**/*'

jobs:

  # # #
  # Auto-discover modules and module->apps mapping from filesystem,
  # then filter down to the modules that actually need to build.
  # PR builds are triggered manually via /build (build-command.yml).

  discover:
    name: Discover Modules
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-24.04-arm
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      modules-apps: ${{ steps.discover.outputs.modules-apps }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ github.event_name == 'push' && '0' || '2' }}

      - id: scan
        shell: bash
        run: |
          MAPPING=$(find modules/*/apps/* -maxdepth 0 -type d | sort | sed 's|modules/||; s|/apps/|:|')
          {
            echo "modules-apps<<EOF"
            echo "$MAPPING"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - id: discover
        uses: ./.github/actions/discover-modules
        with:
          modules-apps: ${{ steps.scan.outputs.modules-apps }}
          selected-module: ${{ inputs.module || 'all' }}
          build-all: ${{ inputs.build_all || 'true' }}

  # # #
  # Generate package-lock.json once,
  # shared across all builds.

  package-lock:
    name: Generate package-lock.json
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-24.04-arm
    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - run: npm install --package-lock-only --ignore-scripts

      - uses: actions/upload-artifact@v7
        with:
          name: package-lock
          path: package-lock.json
          retention-days: 1

  # # #
  # Notify go-infra: preview deploy after /build, teardown on PR close.

  notify-infra:
    name: Notify Infrastructure
    needs: [package-lock]
    if: |
      always() && (
        (github.event_name == 'pull_request' && github.event.action == 'closed') ||
        (inputs.pr_number != '' && needs.package-lock.result == 'success')
      )
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: tmlmobilidade/go-infra
          event-type: preview-pr
          client-payload: >-
            {
              "pr_number": ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }},
              "pr_action": "${{ github.event_name == 'pull_request' && github.event.action || 'synchronize' }}"
            }

  # # #
  # Build and push Docker images for each module that needs it.

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover, package-lock]
    if: needs.discover.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover.outputs.modules-apps }}
      image-tag: ${{ inputs.pr_number != '' && format('pr-{0}', inputs.pr_number) || github.ref_name }}
      environment: ${{ inputs.pr_number != '' && format('pr-{0}', inputs.pr_number) || github.ref_name }}
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit
