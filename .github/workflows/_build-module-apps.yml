name: Build Module Apps

on:
  workflow_call:
    inputs:
      module:
        description: "Module name"
        required: true
        type: string
      modules-apps:
        description: "JSON object mapping modules to their apps"
        required: true
        type: string
      ref-name:
        description: "Git ref name (branch/tag)"
        required: true
        type: string

jobs:

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  get-apps:
    name: Get Apps for ${{ inputs.module }}
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.get-apps.outputs.apps }}
    steps:
      - name: Get apps for module
        id: get-apps
        run: |
          MODULE="${{ inputs.module }}"
          MODULES_APPS='${{ inputs.modules-apps }}'
          APPS=$(echo "$MODULES_APPS" | jq -r ".[\"$MODULE\"] // []")

          {
            echo "apps<<EOF"
            echo "$APPS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Apps for module $MODULE: $APPS"

  build:
    name: Build ${{ inputs.module }}/${{ matrix.app }}
    needs: get-apps
    if: needs.get-apps.outputs.apps != '[]'
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ inputs.module }}-${{ matrix.app }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.get-apps.outputs.apps) }}
    steps:

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Generate nginx.conf from template
        if: matrix.app == 'nginx'
        run: |
          MODULE="${{ inputs.module }}"
          TEMPLATE=".github/templates/nginx/nginx.conf.template"
          OUTPUT="modules/${MODULE}/apps/nginx/configs/nginx.conf"

          # Create directory if it doesn't exist
          mkdir -p "$(dirname "$OUTPUT")"

          # Replace {{MODULE}} placeholder with actual module name
          sed "s/{{MODULE}}/${MODULE}/g" "$TEMPLATE" > "$OUTPUT"

          echo "Generated $OUTPUT from template"

      - name: Determine Dockerfile template
        id: dockerfile
        run: |
          MODULE="${{ inputs.module }}"
          APP="${{ matrix.app }}"

          # Determine Dockerfile template based on app type and module
          if [ "$APP" = "nginx" ]; then
            DOCKERFILE=".github/templates/docker/nginx.dockerfile"
          elif [ "$APP" = "frontend" ]; then
            DOCKERFILE=".github/templates/docker/frontend.dockerfile"
          else
            DOCKERFILE=".github/templates/docker/nodejs.dockerfile"
          fi

          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "Dockerfile for $MODULE/$APP: $DOCKERFILE"

      - name: Download package-lock.json artifact
        uses: actions/download-artifact@v8
        with:
          name: package-lock.json
          path: .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          push: ${{ inputs.ref-name == 'production' || inputs.ref-name == 'staging' }}
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          tags: ghcr.io/tmlmobilidade/go-${{ inputs.module }}-${{ matrix.app }}:${{ (inputs.ref-name == 'production' || inputs.ref-name == 'staging') && inputs.ref-name || 'none' }}
          build-args: |
            MODULE=${{ inputs.module }}
            APP=${{ matrix.app }}
            ENVIRONMENT=${{ inputs.ref-name }}
            NGINX_SERVER_NAME=${{ inputs.ref-name == 'staging' && 'go-stg.tmlmobilidade.pt' || 'go.tmlmobilidade.pt' }}