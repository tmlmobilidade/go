name: Build Module Apps

on:
  workflow_call:
    inputs:
      module:
        description: "Module name"
        required: true
        type: string
      modules-apps:
        description: "JSON object mapping modules to their apps"
        required: true
        type: string
      ref-name:
        description: "Git ref name (branch/tag)"
        required: true
        type: string

jobs:

    # # # # # # # # # # # # # # # # # # # # #
    # # # # # # # # # # # # # # # # # # # # #
    
  get-apps:
    name: Get Apps for ${{ inputs.module }}
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.get-apps.outputs.apps }}
    steps:
      - name: Get apps for module
        id: get-apps
        run: |
          MODULE="${{ inputs.module }}"
          MODULES_APPS='${{ inputs.modules-apps }}'
          APPS=$(echo "$MODULES_APPS" | jq -r ".[\"$MODULE\"] // []")
          
          {
            echo "apps<<EOF"
            echo "$APPS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "Apps for module $MODULE: $APPS"

  build:
    name: Build ${{ inputs.module }}/${{ matrix.app }}
    needs: get-apps
    if: needs.get-apps.outputs.apps != '[]'
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ inputs.module }}-${{ matrix.app }}
      cancel-in-progress: false
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.get-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Dockerfile template
        id: dockerfile
        run: |
          MODULE="${{ inputs.module }}"
          APP="${{ matrix.app }}"
          
          # Determine Dockerfile template based on app type and module
          if [ "$MODULE" = "gateway" ] && [ "$APP" = "nginx" ]; then
            DOCKERFILE=".github/docker/gateway-nginx.dockerfile"
          elif [ "$APP" = "frontend" ]; then
            DOCKERFILE=".github/docker/frontend.dockerfile"
          elif [ "$APP" = "nginx" ]; then
            DOCKERFILE=".github/docker/nginx.dockerfile"
          else
            DOCKERFILE=".github/docker/nodejs.dockerfile"
          fi
          
          echo "dockerfile=$DOCKERFILE" >> $GITHUB_OUTPUT
          echo "Dockerfile for $MODULE/$APP: $DOCKERFILE"

      - name: Download package-lock.json artifact
        uses: actions/download-artifact@v4
        with:
          name: package-lock.json
          path: .
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          push: false
          tags: ghcr.io/tmlmobilidade/go-${{ inputs.module }}-${{ matrix.app }}:${{ inputs.ref-name }}
          build-args: |
            MODULE=${{ inputs.module }}
            APP=${{ matrix.app }}
            ENVIRONMENT=${{ inputs.ref-name }}
            NGINX_SERVER_NAME=${{ inputs.ref-name == 'staging' && 'staging.go.tmlmobilidade.pt' || 'go.tmlmobilidade.pt' }}
          outputs: type=docker,dest=/tmp/image-${{ inputs.module }}-${{ matrix.app }}.tar

      - name: Save Docker Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.module }}-${{ matrix.app }}
          path: /tmp/image-${{ inputs.module }}-${{ matrix.app }}.tar
          retention-days: 1

  publish:
    name: Publish ${{ inputs.module }}/${{ matrix.app }}
    needs: [get-apps, build]
    if: success() && needs.get-apps.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.get-apps.outputs.apps) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.module }}-${{ matrix.app }}

      - name: Load Docker Image
        run: |
          docker load -i image-${{ inputs.module }}-${{ matrix.app }}.tar

      - name: Push Docker Image
        run: |
          docker push ghcr.io/tmlmobilidade/go-${{ inputs.module }}-${{ matrix.app }}:${{ inputs.ref-name }}

