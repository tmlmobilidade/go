name: 'Stops | Build & Push'

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - 'staging/**'
      - staging
    paths:
      - 'modules/stops/**'
      - 'packages/**'
      - '.github/workflows/build-stops.yml' 

# # #

jobs:

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  frontend:
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/stops/apps/frontend/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-stops-frontend:${{ github.ref_name }}
      environment: ${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  api:
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/stops/apps/api/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-stops-api:${{ github.ref_name }}
      environment: ${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # #

  organizer:
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/stops/apps/organizer/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-stops-organizer:${{ github.ref_name }}
      environment: ${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # #

  nginx:
    uses: ./.github/workflows/_build-and-publish.yml
    with:
      file: ./modules/stops/apps/nginx/Dockerfile
      tags: ghcr.io/tmlmobilidade/go-stops-nginx:${{ github.ref_name }}
      environment: ${{ github.ref_name }}