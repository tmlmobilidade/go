# MongoDB Replica Set — Production Reference Compose
# This file is for reference only. In production, cloud-init generates
# a per-node compose.yml on each VM with matching configuration.
#
# For a full replica set you need 3 separate VMs, each running their own
# mongod instance. All nodes must share the same keyfile content.
#
# To generate the keyfile (run once, use the same output for all nodes):
#   openssl rand -base64 756

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    command: >
      mongod
      --replSet rs0
      --bind_ip_all
      --port 27017
      --keyFile /data/keyfile/keyfile
    deploy:
      resources:
        limits:
          memory: 10gb
    ports:
      - "27017:27017"
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    volumes:
      - ./data:/data/db
      - ./logs:/var/log/mongodb
      - ./keyfile:/data/keyfile   # keyfile must be chmod 400, owned by uid 999
    env_file:
      - ./secrets/.env
