name: 'Gateway | Build & Push'

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - staging
      - 'staging/**'
    paths:
      - 'modules/gateway/**'
      - '.github/workflows/build-gateway.yml'

# # #

jobs:

  # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # #

  nginx:
    name: nginx
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@master
        with:
          push: true
          file: ./modules/gateway/apps/nginx/Dockerfile
          tags: ghcr.io/tmlmobilidade/go-gateway-nginx:${{ github.ref_name }}
          build-args: |
            ENVIRONMENT=${{ github.ref_name }}
            NGINX_SERVER_NAME=${{ github.ref_name == 'staging' && 'go-stg.tmlmobilidade.pt' || 'go.tmlmobilidade.pt' }}