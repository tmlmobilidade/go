name: Build Modules

on:
  workflow_dispatch:
  push:
    branches:
      - prd
    paths:
      - 'modules/**'
      - 'packages/**'
      - '.github/workflows/build-modules.yml'
      - '.github/actions/**/*'
      - '.github/templates/**/*'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # # #
  # Auto-discover modules and module->apps mapping from filesystem

  discover:
    name: Discover Modules
    if: github.event.action != 'closed'
    runs-on: ubuntu-24.04-arm
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      modules-apps: ${{ steps.discover.outputs.modules-apps }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: modules
      - id: discover
        run: |
          MODULES_APPS=$(
            find modules/*/apps/* -maxdepth 0 -type d | sort | \
            jq -Rsc '
              split("\n")
              | map(select(length > 0))
              | map(split("/"))
              | map({module: .[1], app: .[3]})
              | group_by(.module)
              | map({key: .[0].module, value: (map(.app))})
              | from_entries
            '
          )

          MODULES=$(echo "$MODULES_APPS" | jq -c 'keys')

          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "modules-apps=$MODULES_APPS" >> $GITHUB_OUTPUT
          echo "$MODULES_APPS" | jq .

  # # #
  # Generate package-lock.json once,
  # shared across all builds.

  package-lock:
    name: Generate package-lock.json
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-24.04-arm
    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - run: npm install --package-lock-only

      - uses: actions/upload-artifact@v7
        with:
          name: package-lock
          path: package-lock.json
          retention-days: 1

  # # #
  # If the current workflow is triggered by a pull request,
  # eagerly notify the go-infra repo to generate a preview environment,
  # even if some of the builds fail. This allows faster feedback for PR authors.

  notify-infra:
    name: Notify Infrastructure
    needs: [package-lock]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      (github.event.action == 'closed' || needs.package-lock.result == 'success')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: tmlmobilidade/go-infra
          event-type: preview-pr
          client-payload: >-
            {
              "pr_number": ${{ github.event.pull_request.number }},
              "pr_action": "${{ github.event.action }}"
            }

  # # #
  # Build and push Docker images for each module

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover, package-lock]
    if: needs.discover.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover.outputs.modules-apps }}
      image-tag: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
      environment: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
    secrets: inherit
