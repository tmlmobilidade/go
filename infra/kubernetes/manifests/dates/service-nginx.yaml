apiVersion: v1
kind: Service
metadata:
  name: dates-nginx
  namespace: go-dates
  labels:
    app: dates-nginx
    app.kubernetes.io/name: dates-nginx
    app.kubernetes.io/part-of: go-dates
spec:
  # NodePort: the nginx proxy VM in pub-go forwards external traffic to this port.
  type: NodePort
  selector:
    app: dates-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30082
      protocol: TCP
