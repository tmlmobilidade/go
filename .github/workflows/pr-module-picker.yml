name: PR Module Picker

on:
  pull_request:
    types:
      - opened
      - reopened

permissions:
  pull-requests: write
  issues: write

jobs:
  post-picker:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - id: scan
        shell: bash
        run: |
          find modules -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort > modules.txt
          { echo "modules<<EOF"; cat modules.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - uses: actions/github-script@v8
        env:
          MODULE_LIST: ${{ steps.scan.outputs.modules }}
        with:
          script: |
            const marker = '<!-- go-modules-build-picker -->';
            const pr = context.payload.pull_request.number;
            const lines = (process.env.MODULE_LIST || '').split('\n').filter(Boolean);
            const body = [
              marker,
              '',
              '### Optional: build specific modules',
              'Push still auto-builds changed modules. To build more: check modules below, then comment `/build-modules`.',
              '',
              ...lines.map((m) => `- [ ] ${m}`),
            ].join('\n');

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr, per_page: 100,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
            }
