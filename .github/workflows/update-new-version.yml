name: "Update New Version"

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Optional version override (leave empty to auto-generate)'
        required: false
        type: string
  push:
    branches:
      - feature/iso-1503-adicionar-n-da-versao-do-go
    paths:
      - 'packages/**'
      - 'scripts/versions.sh'
      - '.github/workflows/update-new-version.yml'

permissions:
  contents: write

jobs:

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  version-number:
    name: 'Version Number'
    runs-on: ubuntu-latest
    outputs:
      version_number: ${{ steps.generate-version-number.outputs.version_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: generate-version-number
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override || '' }}
        run: |
          version="$(bash scripts/versions.sh --print-only)"
          echo "Generated version: $version"
          echo "version_number=$version" >> "$GITHUB_OUTPUT"
          
  # # # # # # # # # # # # # # # # # # # # #

  update-new-version:
    name: 'Update New Version'
    needs: [version-number]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Update new version
        env:
          VERSION_NUMBER: ${{ needs.version-number.outputs.version_number }}
        run: |
          if [[ -z "${VERSION_NUMBER}" ]]; then
            echo "::error::version_number output was empty — check job outputs on version-number."
            exit 1
          fi
          VERSION_OVERRIDE="${VERSION_NUMBER}" bash scripts/versions.sh
          npm version --no-git-tag-version "$VERSION_NUMBER"

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          add: |-
            package.json
            packages/ui/src/types/version.ts
          message: 'chore: update new version to ${{ needs.version-number.outputs.version_number }}'
          push: true

      - name: check injected version
        shell: bash
        run: |
          VERSION="${{ needs.version-number.outputs.version_number }}"
          echo "output version: $VERSION"
          if echo "$VERSION" | grep -q "${{ needs.version-number.outputs.version_number }}"; then
            echo "✓ Version correctly injected"
          else
            echo "✗ Version NOT injected"
            exit 1
          fi