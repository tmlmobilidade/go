#cloud-config
# Nginx Gateway Node - Cloud Init Configuration
# This template configures a node to run as an Nginx reverse proxy/gateway

# -----------------------------------------------------
# Package Installation
# -----------------------------------------------------
package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - unzip
  - jq
  - net-tools
  - ca-certificates
  - gnupg
  - lsb-release
  - nginx
  - certbot
  - python3-certbot-nginx

# -----------------------------------------------------
# File Creation
# Configuration files for Nginx and optional Consul Template
# -----------------------------------------------------
write_files:
  # Main Nginx configuration
  - path: /etc/nginx/nginx.conf
    permissions: '0644'
    content: |
      user nginx;
      worker_processes auto;
      error_log /var/log/nginx/error.log warn;
      pid /var/run/nginx.pid;

      events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
      }

      http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # Logging format
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

        access_log /var/log/nginx/access.log main;

        # Performance settings
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript
                   application/rss+xml application/atom+xml image/svg+xml;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Rate limiting zone
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

        # Upstream servers (dynamically updated by consul-template if enabled)
        include /etc/nginx/conf.d/upstreams.conf;

        # Virtual hosts
        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;
      }

  # Default upstream configuration (placeholder)
  - path: /etc/nginx/conf.d/upstreams.conf
    permissions: '0644'
    content: |
      # Upstream servers - update with actual backend addresses
      # This file can be dynamically updated by consul-template

      upstream nomad_ui {
        least_conn;
        server 127.0.0.1:4646 max_fails=3 fail_timeout=30s;
        # Additional servers will be added here
        keepalive 32;
      }

      upstream consul_ui {
        least_conn;
        server 127.0.0.1:8500 max_fails=3 fail_timeout=30s;
        keepalive 32;
      }

      upstream app_backend {
        least_conn;
        # Backend servers - populated by consul-template or manually
        %{ for addr in split(",", upstream_servers) ~}
        server ${addr} max_fails=3 fail_timeout=30s;
        %{ endfor ~}
        keepalive 64;
      }

  # Default server configuration
  - path: /etc/nginx/sites-available/default
    permissions: '0644'
    content: |
      # Default server - redirect HTTP to HTTPS
      server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check endpoint
        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }

        # Redirect to HTTPS
        location / {
          return 301 https://$host$request_uri;
        }
      }

      # HTTPS server
      server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # SSL configuration - update with actual certificates
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Proxy to application backend
        location / {
          proxy_pass http://app_backend;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
        }

        # Nomad UI (restricted access)
        location /nomad/ {
          proxy_pass http://nomad_ui/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          # Add authentication here
        }

        # Consul UI (restricted access)
        location /consul/ {
          proxy_pass http://consul_ui/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          # Add authentication here
        }

        # Health check endpoint
        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }
      }

  # Consul template configuration (if enabled)
  - path: /etc/consul-template.d/config.hcl
    permissions: '0644'
    content: |
      consul {
        address = "${consul_address}"
      }

      template {
        source      = "/etc/consul-template.d/templates/upstreams.ctmpl"
        destination = "/etc/nginx/conf.d/upstreams.conf"
        command     = "nginx -s reload"
      }

  # Consul template for dynamic upstream discovery
  - path: /etc/consul-template.d/templates/upstreams.ctmpl
    permissions: '0644'
    content: |
      # Auto-generated by consul-template
      # DO NOT EDIT MANUALLY

      {{- range services }}
      {{- if .Tags | contains "http" }}
      upstream {{ .Name }} {
        least_conn;
        {{- range service .Name }}
        server {{ .Address }}:{{ .Port }} max_fails=3 fail_timeout=30s;
        {{- end }}
        keepalive 32;
      }
      {{- end }}
      {{- end }}

  # SSL certificate placeholder (self-signed for initial setup)
  - path: /etc/nginx/ssl/generate-self-signed.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      mkdir -p /etc/nginx/ssl
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        -keyout /etc/nginx/ssl/server.key \
        -out /etc/nginx/ssl/server.crt \
        -subj "/C=PT/ST=Lisbon/L=Lisbon/O=TMLMobilidade/CN=gateway.local"

  # Systemd service for consul-template (if enabled)
  - path: /etc/systemd/system/consul-template.service
    permissions: '0644'
    content: |
      [Unit]
      Description=consul-template
      Documentation=https://github.com/hashicorp/consul-template
      Wants=network-online.target
      After=network-online.target

      [Service]
      ExecStart=/usr/local/bin/consul-template -config=/etc/consul-template.d/config.hcl
      KillSignal=SIGINT
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

# -----------------------------------------------------
# Commands to run on first boot
# -----------------------------------------------------
runcmd:
  # Create directories
  - mkdir -p /etc/nginx/ssl /etc/nginx/sites-enabled
  - mkdir -p /etc/consul-template.d/templates

  # Generate self-signed certificate for initial setup
  - /etc/nginx/ssl/generate-self-signed.sh

  # Link default site
  - ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default

  # Install consul-template if consul integration is enabled
  - |
    if [ "${enable_consul_template}" = "true" ]; then
      CONSUL_TEMPLATE_VERSION="0.37.2"
      curl -fsSL https://releases.hashicorp.com/consul-template/$${CONSUL_TEMPLATE_VERSION}/consul-template_$${CONSUL_TEMPLATE_VERSION}_linux_amd64.zip -o /tmp/consul-template.zip
      unzip /tmp/consul-template.zip -d /usr/local/bin/
      chmod +x /usr/local/bin/consul-template
      systemctl enable consul-template
      systemctl start consul-template
    fi

  # Test Nginx configuration
  - nginx -t

  # Enable and start Nginx
  - systemctl enable nginx
  - systemctl restart nginx

# Final message
final_message: "Nginx gateway node is ready after $UPTIME seconds"
