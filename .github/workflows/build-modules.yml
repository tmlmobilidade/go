name: Build Modules

run-name: ${{ inputs.pr_number != '' && format('build-module-{0}', inputs.pr_number) || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module(s) to build — comma or space separated, or "all"'
        required: false
        default: 'all'
        type: string
      build_all:
        description: 'Build every module when no specific module is selected'
        required: false
        default: true
        type: boolean
      pr_number:
        description: 'PR number — sets image tag to pr-{N} when set (/build)'
        required: false
        type: string
  pull_request:
    types: [closed]
  push:
    branches:
      - prd
    paths:
      - 'modules/**'
      - 'packages/**'
      - 'packages-new/**'
      - '.github/workflows/build-modules.yml'
      - '.github/actions/**/*'
      - '.github/templates/**/*'

jobs:

  # # #
  # Auto-discover modules and module->apps mapping from filesystem,
  # then filter down to the modules that actually need to build.
  # PR builds are triggered manually via /build (build-command.yml).

  discover:
    name: Discover Modules
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-24.04-arm
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      modules-apps: ${{ steps.discover.outputs.modules-apps }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ github.event_name == 'push' && '0' || '2' }}

      - id: scan
        shell: bash
        run: |
          MAPPING=$(find modules/*/apps/* -maxdepth 0 -type d | sort | sed 's|modules/||; s|/apps/|:|')
          {
            echo "modules-apps<<EOF"
            echo "$MAPPING"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - id: discover
        uses: ./.github/actions/discover-modules
        with:
          modules-apps: ${{ steps.scan.outputs.modules-apps }}
          selected-module: ${{ inputs.module || 'all' }}
          build-all: ${{ inputs.build_all || 'true' }}

  # # #
  # Generate package-lock.json once,
  # shared across all builds.

  package-lock:
    name: Generate package-lock.json
    needs: discover
    if: needs.discover.outputs.modules != '[]'
    runs-on: ubuntu-24.04-arm
    steps:

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - run: npm install --package-lock-only --ignore-scripts

      - uses: actions/upload-artifact@v7
        with:
          name: package-lock
          path: package-lock.json
          retention-days: 1

  # # #
  # Build and push Docker images for each module that needs it.

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover, package-lock]
    if: needs.discover.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover.outputs.modules-apps }}
      image-tag: ${{ inputs.pr_number != '' && format('pr-{0}', inputs.pr_number) || github.ref_name }}
      environment: ${{ inputs.pr_number != '' && format('pr-{0}', inputs.pr_number) || github.ref_name }}
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit

  # # #
  # Notify go-infra: create/update PR overlay after successful /build.

  notify-infra-build:
    name: Notify Infrastructure (Build Preview)
    needs: [build-module]
    if: |
      always() &&
      inputs.pr_number != '' &&
      needs.build-module.result != 'skipped' &&
      needs.build-module.result != 'cancelled'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: built-apps-*
          merge-multiple: true

      - name: Dispatch preview build to go-infra
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          github-token: ${{ secrets.INFRA_REPO_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const specs = [];
            for (const entry of fs.readdirSync('.', { withFileTypes: true })) {
              if (!entry.isFile() || !entry.name.startsWith('built-apps-') || !entry.name.endsWith('.txt')) {
                continue;
              }
              for (const line of fs.readFileSync(path.join('.', entry.name), 'utf8').split('\n')) {
                const spec = line.trim();
                if (spec) specs.push(spec);
              }
            }

            const builtApps = [...new Set(specs)].sort();
            if (builtApps.length === 0) {
              core.info('No successful builds to publish — skip preview dispatch');
              return;
            }

            core.info(`Dispatching preview build for PR #${process.env.PR_NUMBER}: ${builtApps.join(', ')}`);

            await github.rest.repos.createDispatchEvent({
              owner: 'tmlmobilidade',
              repo: 'go-infra',
              event_type: 'preview-pr',
              client_payload: {
                pr_number: Number(process.env.PR_NUMBER),
                pr_action: 'build',
                built_apps: builtApps.join(','),
              },
            });

  # # #
  # Notify go-infra: remove PR overlay when PR is closed.

  notify-infra-cleanup:
    name: Notify Infrastructure (Cleanup Preview)
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: tmlmobilidade/go-infra
          event-type: preview-pr
          client-payload: >-
            {
              "pr_number": ${{ github.event.pull_request.number }},
              "pr_action": "closed"
            }
