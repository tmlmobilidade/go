apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: go-gateway
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: go-poc
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      keepalive_timeout 65;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      # Module nginx upstreams (ClusterIP — reachable cluster-internally)
      upstream docs_upstream        { server docs.go-gateway.svc.cluster.local:80;                  keepalive 16; }
      upstream auth_upstream        { server auth-nginx.go-auth.svc.cluster.local:80;               keepalive 16; }
      upstream dates_upstream       { server dates-nginx.go-dates.svc.cluster.local:80;             keepalive 16; }
      upstream stops_upstream       { server stops-nginx.go-stops.svc.cluster.local:80;             keepalive 16; }
      upstream fleet_upstream       { server fleet-nginx.go-fleet.svc.cluster.local:80;             keepalive 16; }
      upstream locations_upstream   { server locations-nginx.go-locations.svc.cluster.local:80;     keepalive 16; }
      upstream offer_upstream       { server offer-nginx.go-offer.svc.cluster.local:80;             keepalive 16; }
      upstream plans_upstream       { server plans-nginx.go-plans.svc.cluster.local:80;             keepalive 16; }
      upstream alerts_upstream      { server alerts-nginx.go-alerts.svc.cluster.local:80;           keepalive 16; }
      upstream performance_upstream { server performance-nginx.go-performance.svc.cluster.local:80; keepalive 16; }
      upstream ticketing_upstream   { server ticketing-nginx.go-ticketing.svc.cluster.local:80;     keepalive 16; }
      upstream exporter_upstream    { server exporter-nginx.go-exporter.svc.cluster.local:80;       keepalive 16; }
      upstream controller_upstream  { server controller-nginx.go-controller.svc.cluster.local:80;   keepalive 16; }

      server {
        listen 80 default_server;

        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }

        location /auth {
          proxy_pass         http://auth_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /dates {
          proxy_pass         http://dates_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /stops {
          proxy_pass         http://stops_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /fleet {
          proxy_pass         http://fleet_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /locations {
          proxy_pass         http://locations_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /offer {
          proxy_pass         http://offer_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /plans {
          proxy_pass         http://plans_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /alerts {
          proxy_pass         http://alerts_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /performance {
          proxy_pass         http://performance_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /ticketing {
          proxy_pass         http://ticketing_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /exporter {
          proxy_pass         http://exporter_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location /controller {
          proxy_pass         http://controller_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }

        location / {
          proxy_pass         http://docs_upstream;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_set_header   Upgrade           $http_upgrade;
          proxy_set_header   Connection        $connection_upgrade;
          proxy_connect_timeout 60s;
          proxy_send_timeout    60s;
          proxy_read_timeout    60s;
        }
      }
    }
