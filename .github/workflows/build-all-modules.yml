# # #

name: 'All Modules | Build & Test'

# # #

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - staging
      - 'staging/**'
    paths:
      - 'modules/**'
      - '!modules/*/environments/**'
      - 'packages/**'
      - '.github/workflows/build-all-modules.yml'

# # #

# Hardcoded array of modules and their apps to build
# Format: module:app (one app per line)
env:
  MODULES_APPS: |
    auth:api
    auth:frontend
    auth:nginx
    auth:cleaner
    auth:file-exporter

    alerts:api
    alerts:frontend
    alerts:nginx
    alerts:organizer
    
    controller:api
    controller:frontend
    controller:nginx
    controller:coordinator
    controller:rides-acceptor
    controller:rides-bridge
    controller:rides-cleaner
    controller:rides-examiner
    controller:rides-feeder
    controller:rides-locker
    controller:sams-examiner
    controller:sams-feeder

    locations:api
    locations:frontend
    locations:nginx
    
    performance:api
    performance:frontend
    performance:nginx
    performance:sync-metrics
    
    plans:api
    plans:frontend
    plans:nginx
    plans:cleaner
    plans:export-drt
    plans:export-merged
    plans:export-posters
    plans:validator

    replicator:enrich
    replicator:stream
    replicator:sync-apex-locations
    replicator:sync-vehicle-events
    replicator:sync-apex-on-board-refunds
    replicator:sync-apex-on-board-sales
    replicator:sync-apex-validations
    
    stops:api
    stops:frontend
    stops:nginx
    stops:organizer

# # #

jobs:

  discover-modules:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      modules-apps: ${{ steps.discover.outputs.modules-apps }}
    steps:
      - name: Discover modules and apps
        id: discover
        uses: ./.github/actions/discover-modules
        with:
          modules-apps: ${{ env.MODULES_APPS }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build-packages:
    name: Build Packages Cache
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install --package-lock-only

      - name: Save package-lock.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-lock.json
          path: package-lock.json
          retention-days: 1

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover-modules, build-packages]
    if: needs.discover-modules.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }} 
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover-modules.outputs.modules-apps }}
      ref-name: ${{ github.ref_name }}
    secrets: inherit



