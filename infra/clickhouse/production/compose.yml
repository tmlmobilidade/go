# ClickHouse Replica Set — Production Reference Compose
# This file is for reference only. In production, cloud-init generates
# a per-node compose.yml on each VM with the correct port mappings.
#
# For a full cluster you need 3 separate VMs, each running their own
# instance. This file shows what each node's compose looks like.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 11gb
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native TCP
      - "9009:9009"   # Interserver replication
      - "2181:2181"   # ClickHouse Keeper client (ZK-compatible)
      - "9444:9444"   # ClickHouse Keeper Raft (inter-keeper)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./clickhouse_data:/var/lib/clickhouse
      - ./clickhouse_logs:/var/log/clickhouse-server
      - ./config.d:/etc/clickhouse-server/config.d
      - ./users.d:/etc/clickhouse-server/users.d
    env_file:
      - ./secrets/.env
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
