# # #

name: 'Packages | Publish to NPM'

on:
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Publish all packages (ignores file changes)'
        required: false
        default: true
        type: boolean
  push:
    branches:
      - production
    paths:
      - 'packages/**'
      - '.github/workflows/packages-publish-all.yml'

# # #

# Hardcoded array of packages to publish (one package name per line)
env:
  PACKAGES: |
    connectors
    emails
    import-gtfs
    interfaces
    lib
    tsconfig
    types
    ui
    utils

# # #

jobs:

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  version-number:
    name: 'Version Number'
    runs-on: ubuntu-latest
    steps:
      - id: generate-version-number
        run: |
          version="$(date +%Y%m%d).$(date +%H%M).$(date +%S)"
          npm_tag="latest"
          echo "Generated version: $version ($npm_tag)"
          echo "version_number=$version" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
    outputs:
      version_number: ${{ steps.generate-version-number.outputs.version_number }}
      npm_tag: ${{ steps.generate-version-number.outputs.npm_tag }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  discover-packages:
    name: Discover Packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.discover.outputs.packages }}
    steps:
      # # #
      - name: Discover packages
        id: discover
        uses: actions/github-script@v7
        env:
          PACKAGES: ${{ env.PACKAGES }}
        with:
          script: |
            // Parse package names (one per line)
            const packages = process.env.PACKAGES
              .split('\n')
              .map(line => line.trim())
              .filter(Boolean);

            core.setOutput('packages', JSON.stringify(packages));

            console.log('Packages to publish:', packages);

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  publish-package:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [version-number, discover-packages]
    if: needs.discover-packages.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover-packages.outputs.packages) }}
    steps:
      # # #
      - name: Checkout repository
        uses: actions/checkout@v4
      # # #
      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
      # # #
      - name: Check if package has build script
        id: check-build
        working-directory: packages/${{ matrix.package }}
        run: |
          if [ -f package.json ]; then
            if grep -q '"build"' package.json; then
              echo "has_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_build=false" >> "$GITHUB_OUTPUT"
          fi
      # # #
      - name: Build package
        if: steps.check-build.outputs.has_build == 'true'
        working-directory: packages/${{ matrix.package }}
        run: npm run build
      # # #
      - name: Bump package version
        working-directory: packages/${{ matrix.package }}
        run: npm version --no-git-tag-version ${{ needs.version-number.outputs.version_number }}
      # # #
      - name: Publish package to NPM
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public --tag ${{ needs.version-number.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}