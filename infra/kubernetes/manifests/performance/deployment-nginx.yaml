apiVersion: apps/v1
kind: Deployment
metadata:
  name: performance-nginx
  namespace: go-performance
  labels:
    app: performance-nginx
    app.kubernetes.io/name: performance-nginx
    app.kubernetes.io/component: nginx
    app.kubernetes.io/part-of: go-performance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: performance-nginx
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: performance-nginx
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [performance-nginx]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: ghcr.io/tmlmobilidade/go-performance-nginx:k8s
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
