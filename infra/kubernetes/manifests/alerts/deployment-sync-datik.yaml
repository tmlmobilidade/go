apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerts-sync-datik
  namespace: go-alerts
  labels:
    app: alerts-sync-datik
    app.kubernetes.io/name: alerts-sync-datik
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: go-alerts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alerts-sync-datik
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: alerts-sync-datik
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: sync-datik
          image: ghcr.io/tmlmobilidade/go-alerts-sync-datik:k8s
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: alerts-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
