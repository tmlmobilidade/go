apiVersion: v1
kind: Service
metadata:
  # Name must match the upstream in the baked-in nginx config: "server api:5050"
  name: api
  namespace: go-stops
  labels:
    app: stops-api
    app.kubernetes.io/name: stops-api
    app.kubernetes.io/part-of: go-stops
spec:
  type: ClusterIP
  selector:
    app: stops-api
  ports:
    - name: http
      port: 5050
      targetPort: http
      protocol: TCP
