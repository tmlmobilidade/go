# # #
# GATEWAY MODULE — PoC nginx configuration
#
# Adapted from modules/gateway/apps/nginx/configs/nginx.conf for standalone
# Kubernetes use. Key differences from the production config:
#
#   - HTTP only (port 80): TLS termination is handled by the Kubernetes Ingress
#     / OCI Load Balancer, not by nginx. Remove Lets Encrypt config.
#   - No upstream blocks: other GO services do not exist in the PoC cluster.
#   - Returns a JSON 200 OK response so the PoC validates the full traffic path.
#   - Retains rate limiting, compression, and logging as production best practices.



# # #
# USER

user nginx;



# # #
# WORKER PROCESSES

worker_processes auto;



# # #
# DEFAULTS

error_log /var/log/nginx/error.log notice;
pid       /var/run/nginx.pid;



# # #
# EVENTS

events {
	use              epoll;
	worker_connections 1024;
	multi_accept     on;
}



# # #
# HTTP

http {


	# # #
	# MIME TYPES

	include      /etc/nginx/mime.types;
	default_type application/octet-stream;


	# # #
	# LOGS

	log_format main '$time_iso8601 | $status | IP $remote_addr | Request: "$request"';

	access_log /var/log/nginx/access.log main;


	# # #
	# FILE DESCRIPTOR SETTINGS

	sendfile   on;
	tcp_nopush on;

	keepalive_timeout 65;


	# # #
	# RATE LIMITS

	limit_req_zone global zone=global:10m rate=500r/s;
	limit_req zone=global burst=200 delay=2;

	limit_req_zone $binary_remote_addr zone=ip:10m rate=50r/s;
	limit_req zone=ip burst=50 delay=2;

	limit_req_status 429;


	# # #
	# COMPRESSION

	gzip on;
	gzip_types application/json;


	# # #
	# HTTP SERVER

	server {

		listen 80;
		listen [::]:80;
		server_tokens off;


		# # #
		# Health check endpoint
		# Used by Kubernetes liveness and readiness probes.
		# Excluded from rate limits and access logs to reduce noise.

		location = /health {
			access_log off;
			return 200 '{"status":"ok"}';
			add_header Content-Type application/json;
		}


		# # #
		# Default route
		# Returns a JSON status response to validate the full traffic path.
		# Replace with proxy_pass blocks as other GO modules are deployed into the cluster.

		location / {
			return 200 '{"status":"ok","service":"gateway-poc","version":"poc"}';
			add_header Content-Type application/json;
		}

	}

}
