#cloud-config
# -----------------------------------------------------------------------
# cloud-init.yaml — RUNTIME ONLY
#
# Docker and OS tuning are pre-baked into the Packer image.
# This file handles only runtime concerns that depend on:
#   - The attached 1TB block volume device
#   - Terraform template variables (ports, passwords)
# -----------------------------------------------------------------------

runcmd:
  # -----------------------------------------------------------------
  # 1. Robust Disk Mounting (OCI Device Detection)
  # -----------------------------------------------------------------
  - |
    DATA_DISK=""
    for disk in sda sdb sdc; do
      SIZE=$(lsblk -b -n -o SIZE /dev/$disk 2>/dev/null || echo 0)
      if [ "$SIZE" -gt 1000000000000 ]; then
        DATA_DISK="/dev/$disk"
        break
      fi
    done

    if [ -n "$DATA_DISK" ]; then
      echo "Data disk found at $DATA_DISK"
      blkid "$DATA_DISK" || mkfs.xfs -L CHDATA "$DATA_DISK"
      mkdir -p /opt/clickhouse
      mount "$DATA_DISK" /opt/clickhouse
      echo "$DATA_DISK /opt/clickhouse xfs defaults,noatime,_netdev 0 0" >> /etc/fstab
    else
      echo "ERROR: 1TB Data disk not found!"
    fi

  # -----------------------------------------------------------------
  # 2. Open OS Firewall for ClickHouse ports
  # (Packages are pre-installed in the Packer image)
  # -----------------------------------------------------------------
  - iptables -I INPUT 6 -p tcp --dport ${clickhouse_http_port} -j ACCEPT
  - iptables -I INPUT 6 -p tcp --dport ${clickhouse_tcp_port} -j ACCEPT
  - netfilter-persistent save

  # -----------------------------------------------------------------
  # 3. Setup ClickHouse Directories (after mount)
  # -----------------------------------------------------------------
  - mkdir -p /opt/clickhouse/clickhouse_data
  - mkdir -p /opt/clickhouse/clickhouse_logs
  - mkdir -p /opt/clickhouse/config.d
  - mkdir -p /opt/clickhouse/users.d
  - mkdir -p /opt/clickhouse/secrets
  - chown -R 101:101 /opt/clickhouse/clickhouse_data
  - chown -R 101:101 /opt/clickhouse/clickhouse_logs
  - chown -R ubuntu:ubuntu /opt/clickhouse/config.d
  - chown -R ubuntu:ubuntu /opt/clickhouse/users.d
  - chown -R ubuntu:ubuntu /opt/clickhouse/secrets
  - chmod -R 775 /opt/clickhouse

  # -----------------------------------------------------------------
  # 4. Write ClickHouse Server Config (config.d)
  # -----------------------------------------------------------------
  - |
    cat > /opt/clickhouse/config.d/tuning.xml <<'TUNEOEOF'
    <clickhouse>
        <!-- Only bind IPv4 — OCI A1 does not expose IPv6 -->
        <listen_host>0.0.0.0</listen_host>

        <!-- Server-level memory: 85% of 12GB = ~10.2GB -->
        <max_server_memory_usage_to_ram_ratio>0.85</max_server_memory_usage_to_ram_ratio>
        <uncompressed_cache_size>2147483648</uncompressed_cache_size>
        <mark_cache_size>2147483648</mark_cache_size>

        <!-- Enable Prometheus metrics -->
        <prometheus>
            <endpoint>/metrics</endpoint>
            <port>9363</port>
            <metrics>true</metrics>
            <events>true</events>
        </prometheus>
    </clickhouse>
    TUNEOEOF

  # -----------------------------------------------------------------
  # 5. Write ClickHouse User Profile Config (users.d)
  # max_memory_usage is user-level in ClickHouse 26+
  # -----------------------------------------------------------------
  - |
    cat > /opt/clickhouse/users.d/tuning.xml <<'USERUEOF'
    <clickhouse>
        <profiles>
            <default>
                <max_memory_usage>10G</max_memory_usage>
            </default>
        </profiles>
    </clickhouse>
    USERUEOF

  # -----------------------------------------------------------------
  # 6. Write Secrets
  # -----------------------------------------------------------------
  - |
    cat > /opt/clickhouse/secrets/.env <<'ENVEOF'
    CLICKHOUSE_PASSWORD=${clickhouse_admin_password}
    CLICKHOUSE_USER=admin
    ENVEOF

  # -----------------------------------------------------------------
  # 7. Write Docker Compose file
  # -----------------------------------------------------------------
  - |
    cat > /opt/clickhouse/compose.yml <<'COMPOSEEOF'
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        container_name: clickhouse
        restart: unless-stopped
        deploy:
          resources:
            limits:
              memory: 11gb
        ports:
          - "${clickhouse_http_port}:8123"
          - "${clickhouse_tcp_port}:9000"
        ulimits:
          nofile:
            soft: 262144
            hard: 262144
        volumes:
          - ./clickhouse_data:/var/lib/clickhouse
          - ./clickhouse_logs:/var/log/clickhouse-server
          - ./config.d:/etc/clickhouse-server/config.d
          - ./users.d:/etc/clickhouse-server/users.d
        env_file:
          - ./secrets/.env
        environment:
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    COMPOSEEOF

  # -----------------------------------------------------------------
  # 8. Start ClickHouse
  # -----------------------------------------------------------------
  - cd /opt/clickhouse && docker compose up -d

final_message: "ClickHouse runtime configuration complete."
