name: PR Comment Bot

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  comment:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: modules
          sparse-checkout-cone-mode: false

      - name: List buildable modules
        id: modules
        shell: bash
        run: |
          JSON=$(ls -1 modules | sort | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "json=$JSON" >> "$GITHUB_OUTPUT"

      - name: Comment PR environment and builds
        uses: actions/github-script@v8
        env:
          MODULES_JSON: ${{ steps.modules.outputs.json }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const modules = JSON.parse(process.env.MODULES_JSON || '[]');
            const moduleList = modules.map((m) => `- \`${m}\``).join('\n');

            const body = [
              `Behold! Your PR has ascended to its own environment:`,
              '',
              `https://pr-${prNumber}.go-stg.tmlmobilidade.pt/`,
              '',
              'Test wisely, deploy bravely.',
              '',
              '---',
              '',
              '### Build modules on demand',
              '',
              'Comment on this PR to build a single module (images tagged `pr-' + prNumber + '`):',
              '',
              '```',
              '/build <module>',
              '```',
              '',
              '**Available modules:**',
              moduleList,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
