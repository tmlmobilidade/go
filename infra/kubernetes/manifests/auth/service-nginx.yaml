apiVersion: v1
kind: Service
metadata:
  name: auth-nginx
  namespace: go-auth
  labels:
    app: auth-nginx
    app.kubernetes.io/name: auth-nginx
    app.kubernetes.io/part-of: go-auth
spec:
  # NodePort: the nginx proxy VM in pub-go forwards external traffic to this port.
  type: NodePort
  selector:
    app: auth-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30081
      protocol: TCP
