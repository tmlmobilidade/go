name: "Discover Modules"
description: "Filters modules to build based on changed files. Modules touched build alone; any package change builds all modules."

inputs:
  modules-apps:
    description: "Newline-separated list of modules and their apps (format: module:app, one app per line)"
    required: true
  selected-modules:
    description: "Comma-separated modules; when set, only these build (manual picker / dispatch)"
    required: false
    default: ""
  selected-module:
    description: "Selected module from workflow_dispatch (or 'all')"
    required: false
    default: "all"
  build-all:
    description: "Whether manual dispatch should build all modules"
    required: false
    default: "true"

outputs:
  modules:
    description: "JSON array of module names to build"
    value: ${{ steps.discover.outputs.modules }}
  modules-apps:
    description: "JSON object mapping module names to their apps"
    value: ${{ steps.discover.outputs.modules-apps }}

runs:
  using: "composite"
  steps:
    - name: Get changed files
      id: changed
      uses: tj-actions/changed-files@v47
      with:
        files: |
          modules/**
          packages/**
        base_sha: ${{ github.event.before || github.event.pull_request.base.sha || '' }}
        sha: ${{ github.sha }}
        include_all_old_new_renamed_files: true

    - name: Get deleted files via git diff
      id: git-diff
      shell: bash
      run: |
        BASE_SHA="${{ github.event.before || github.event.pull_request.base.sha || '' }}"
        CURRENT_SHA="${{ github.sha }}"

        # Use git diff to ensure deleted files are captured too (A/M/D/R).
        if [ -n "$BASE_SHA" ]; then
          CHANGED=$(git diff --name-only --diff-filter=AMDR "$BASE_SHA" "$CURRENT_SHA" 2>/dev/null | grep -E '^(modules|packages)/' || true)
        else
          CHANGED=$(git diff --name-only --diff-filter=AMDR HEAD "$CURRENT_SHA" 2>/dev/null | grep -E '^(modules|packages)/' || true)
        fi

        if [ -n "$CHANGED" ]; then
          {
            echo "changed_files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        else
          echo "changed_files=" >> "$GITHUB_OUTPUT"
        fi

    - name: Discover modules and apps
      id: discover
      uses: actions/github-script@v8
      env:
        MODULES_APPS: ${{ inputs.modules-apps }}
        CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        GIT_DIFF_FILES: ${{ steps.git-diff.outputs.changed_files }}
        SELECTED_MODULES: ${{ inputs.selected-modules }}
        SELECTED_MODULE: ${{ inputs.selected-module }}
        BUILD_ALL: ${{ inputs.build-all }}
      with:
        script: |
          // Parse one app per line format: module:app
          const moduleAppsMap = {};
          process.env.MODULES_APPS
            .split('\n')
            .filter(Boolean)
            .forEach(line => {
              const [module, app] = line.split(':').map(s => s.trim());
              if (module && app) {
                if (!moduleAppsMap[module]) {
                  moduleAppsMap[module] = [];
                }
                moduleAppsMap[module].push(app);
              }
            });

          const allModules = Object.entries(moduleAppsMap).map(([module, apps]) => ({
            module,
            apps,
          }));

          // tj-actions/changed-files reports newline-separated paths.
          const changedFromAction = (process.env.CHANGED_FILES || '')
            .split('\n')
            .filter(Boolean);

          // git diff also catches deletions that the action sometimes misses.
          const changedFromGit = (process.env.GIT_DIFF_FILES || '')
            .split('\n')
            .filter(Boolean);

          const changedFiles = Array.from(new Set([...changedFromAction, ...changedFromGit]));

          const selectedModules = (process.env.SELECTED_MODULES || '')
            .split(',')
            .map((name) => name.trim().toLowerCase())
            .filter(Boolean);
          const hasSelectedModules = selectedModules.length > 0;

          const isManual = context.eventName === 'workflow_dispatch';
          const selectedModule = (process.env.SELECTED_MODULE || 'all').trim().toLowerCase();
          const manualBuildAll = (process.env.BUILD_ALL || 'true') === 'true';
          const hasSpecificManualModule =
            !hasSelectedModules && isManual && selectedModule !== '' && selectedModule !== 'all';

          // Any shared-package change forces a full rebuild (not when user picked specific modules).
          const packagesChanged = changedFiles.some(f => f.startsWith('packages/'));
          const buildAll =
            !hasSelectedModules &&
            ((isManual && !hasSpecificManualModule && manualBuildAll) || packagesChanged);

          const modulesToBuild = [];
          const moduleApps = {};

          for (const { module, apps } of allModules) {
            if (hasSelectedModules) {
              if (selectedModules.includes(module)) {
                modulesToBuild.push(module);
                moduleApps[module] = apps;
              }
            } else if (hasSpecificManualModule) {
              if (module === selectedModule) {
                modulesToBuild.push(module);
                moduleApps[module] = apps;
              }
            } else if (buildAll) {
              modulesToBuild.push(module);
              moduleApps[module] = apps;
            } else {
              // Environment files don't affect built images.
              const changed = changedFiles.some(f =>
                f.startsWith(`modules/${module}/`) && !f.includes('environments/')
              );
              if (changed) {
                modulesToBuild.push(module);
                moduleApps[module] = apps;
              }
            }
          }

          if (hasSelectedModules) {
            const unknown = selectedModules.filter(
              (name) => !allModules.some(({ module }) => module === name),
            );
            if (unknown.length > 0) {
              core.warning(`Unknown module(s) ignored: ${unknown.join(', ')}`);
            }
          }

          core.setOutput('modules', JSON.stringify(modulesToBuild));
          core.setOutput('modules-apps', JSON.stringify(moduleApps));

          core.info(`selected modules: ${JSON.stringify(selectedModules)}`);
          core.info(`packages changed: ${packagesChanged}`);
          core.info(`build all: ${buildAll}`);
          core.info(`modules to build: ${JSON.stringify(modulesToBuild)}`);
          core.info(`modules and apps: ${JSON.stringify(moduleApps)}`);
