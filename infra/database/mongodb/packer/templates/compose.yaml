services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    # network_mode: host so MongoDB sees the real host IP and rs.initiate()
    # can map replica set member addresses back to this node.
    network_mode: host
    command: >
      mongod
      --replSet rs0
      --bind_ip_all
      --port 27017
      --keyFile /data/keyfile/keyfile
    deploy:
      resources:
        limits:
          memory: 10gb
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    volumes:
      - ./data:/data/db
      - ./logs:/var/log/mongodb
      - ./keyfile:/data/keyfile
    env_file:
      - ./secrets/.env
