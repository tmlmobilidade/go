# # #

name: 'All Modules | Build & Test'

# # #

on:
  workflow_dispatch:
  push:
    branches:
      - production
      - staging
      - 'staging/**'
    paths:
      - 'modules/**'
      - '!modules/*/environments/**'
      - 'packages/**'
      - '.github/workflows/build-all-modules.yml'

# # #

jobs:

  discover-modules:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
      modules-apps: ${{ steps.set-modules.outputs.modules-apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover modules and their apps
        id: set-modules
        run: |
          MODULES_ARRAY=()
          declare -A MODULE_APPS
          
          echo "Discovering modules and apps (building all)"
          
          for module_dir in modules/*/; do
            module=$(basename "$module_dir")
            APPS_FOR_MODULE=()
            
            for app_dir in "${module_dir}apps"/*/; do
              if [ -f "${app_dir}Dockerfile" ]; then
                app=$(basename "$app_dir")
                APPS_FOR_MODULE+=("${app}")
                echo "Found ${module}|${app}"
              fi
            done
            
            if [ ${#APPS_FOR_MODULE[@]} -gt 0 ]; then
              MODULES_ARRAY+=("${module}")
              APPS_JSON=$(printf '%s\n' "${APPS_FOR_MODULE[@]}" | jq -R . | jq -s -c .)
              MODULE_APPS["${module}"]="${APPS_JSON}"
            fi
          done
          
          if [ ${#MODULES_ARRAY[@]} -eq 0 ]; then
            echo "No modules to build"
            MODULES="[]"
            MODULES_APPS_JSON="{}"
          else
            MODULES=$(printf '%s\n' "${MODULES_ARRAY[@]}" | jq -R . | jq -s -c .)
            # Create JSON object with module -> apps mapping
            MODULES_APPS_JSON="{"
            FIRST=true
            for module in "${MODULES_ARRAY[@]}"; do
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                MODULES_APPS_JSON+=","
              fi
              MODULES_APPS_JSON+="\"${module}\":${MODULE_APPS[$module]}"
            done
            MODULES_APPS_JSON+="}"
          fi
          
          {
            echo "modules<<EOF"
            echo "$MODULES"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          {
            echo "modules-apps<<EOF"
            echo "$MODULES_APPS_JSON"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          echo "Modules to build: $MODULES"
          echo "Modules and apps: $MODULES_APPS_JSON"

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build-packages:
    name: Build Packages Cache
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Turbo
        run: npm install -g turbo@^2

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Cache Turbo build cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-packages-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            turbo-packages-${{ runner.os }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build:packages

      - name: Cache package-lock.json
        uses: actions/cache@v4
        with:
          path: package-lock.json
          key: package-lock-${{ runner.os }}-${{ hashFiles('package.json', 'packages/**/package.json') }}
          restore-keys: |
            package-lock-${{ runner.os }}-

      - name: Save package-lock.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-lock.json
          path: package-lock.json
          retention-days: 1

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover-modules, build-packages]
    if: needs.discover-modules.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover-modules.outputs.modules-apps }}
      ref-name: ${{ github.ref_name }}
    secrets: inherit



