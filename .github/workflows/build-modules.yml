# # #

name: 'Build Modules'

# # #

on:
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all modules (ignores file changes)'
        required: false
        default: true
        type: boolean
#   pull_request:
  push:
    branches:
      - production
      - staging*
    paths:
      - 'modules/**'
      - '!modules/*/environments/**'
      - 'packages/**'
      - '.github/workflows/build-all-modules.yml'
      - '.github/actions/discover-modules/action.yml'
      - '.github/workflows/_build-module-apps.yml'
      - '.github/templates/**/*'

# # #

# Hardcoded array of modules and their apps to build
# Format: module:app (one app per line)
env:
  MODULES_APPS: |

    alerts:nginx
    alerts:api
    alerts:frontend
    alerts:organizer

    apex:organizer
    apex:stream
    apex:sync-locations
    apex:sync-on-board-refunds
    apex:sync-on-board-sales
    apex:sync-validations

    auth:nginx
    auth:api
    auth:cleaner
    auth:frontend

    controller:nginx
    controller:api
    controller:coordinator
    controller:frontend
    controller:rides-acceptor
    controller:rides-bridge
    controller:rides-cleaner
    controller:rides-examiner
    controller:rides-feeder
    controller:rides-locker
    controller:sams-examiner
    controller:sams-feeder

    dates:nginx
    dates:api
    dates:frontend

    exporter:nginx
    exporter:api
    exporter:cleaner
    exporter:export-drt
    exporter:export-files
    exporter:export-gtfs-merged
    exporter:export-posters
    exporter:frontend

    locations:nginx
    locations:api
    locations:frontend

    performance:nginx
    performance:api
    performance:frontend
    performance:sync-metrics-hourly
    performance:sync-metrics-daily
    performance:sync-metrics-realtime

    plans:nginx
    plans:api
    plans:cleaner
    plans:frontend
    plans:validator

    # replicator:organizer
    # replicator:stream
    # replicator:sync-apex-locations
    # replicator:sync-apex-on-board-refunds
    # replicator:sync-apex-on-board-sales
    # replicator:sync-apex-validations
    # replicator:sync-vehicle-events

    stops:nginx
    stops:api
    stops:frontend
    stops:organizer

    tracker:clickhouse-stream
    tracker:clickhouse-sync
    tracker:cm-legacy-stream
    tracker:cm-legacy-sync
    tracker:ttsl-fetch

    offer:nginx
    offer:api
    offer:frontend

    fleet:nginx
    fleet:api
    fleet:frontend

# # #

jobs:

  check-pr:
    name: Check for Open PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      has-open-pr: ${{ steps.check.outputs.has-open-pr }}
    steps:
      - name: Check if branch has open PR
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('has-open-pr', 'false');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            const hasOpenPR = pulls.length > 0;
            core.setOutput('has-open-pr', hasOpenPR);
            if (hasOpenPR) {
              core.info(`Branch ${branch} has ${pulls.length} open PR(s), skipping push event`);
            }

  discover-modules:
    name: Discover Modules
    needs: check-pr
    if: |
      github.event_name != 'push' ||
      needs.check-pr.outputs.has-open-pr == 'false'
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      modules-apps: ${{ steps.discover.outputs.modules-apps }}
    steps:
      # # #
      - name: Checkout repository
        uses: actions/checkout@v5
      # # #
      - name: Discover modules and apps
        id: discover
        uses: ./.github/actions/discover-modules
        with:
          modules-apps: ${{ env.MODULES_APPS }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  generate-package-lock:
    name: Generate package-lock.json
    needs: discover-modules
    if: needs.discover-modules.outputs.modules != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --package-lock-only

      - name: Save package-lock.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-lock.json
          path: package-lock.json
          retention-days: 1

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  build-module:
    name: Build ${{ matrix.module }}
    needs: [discover-modules, generate-package-lock]
    if: needs.discover-modules.outputs.modules != '[]'
    uses: ./.github/workflows/_build-module-apps.yml
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover-modules.outputs.modules) }}
    with:
      module: ${{ matrix.module }}
      modules-apps: ${{ needs.discover-modules.outputs.modules-apps }}
      ref-name: ${{ github.ref_name }}
    secrets: inherit



