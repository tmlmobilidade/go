apiVersion: v1
kind: Service
metadata:
  name: plans-nginx
  namespace: go-plans
  labels:
    app: plans-nginx
    app.kubernetes.io/name: plans-nginx
    app.kubernetes.io/part-of: go-plans
spec:
  type: NodePort
  selector:
    app: plans-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30087
      protocol: TCP
