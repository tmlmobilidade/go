name: Preview Environments

on:
  push:
    branches:
     - feature/**
     - feat/**
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  REGISTRY: ghcr.io
  KUBERNETES_NAMESPACE_PREFIX: preview
  BASE_DOMAIN: go.tmlmobilidade.pt
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  OCI_KUBECONFIG: ${{ secrets.OCI_KUBECONFIG }}
  OCI_KUBERNETES_CLUSTER_ID: ${{ secrets.OCI_KUBERNETES_CLUSTER_ID }}

jobs:
  # Determine which modules changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.modules }}
      should-deploy: ${{ steps.filter.outputs.should-deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: filter
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA || echo "")
          
          MODULES=""
          if echo "$CHANGED_FILES" | grep -q "modules/auth"; then MODULES="$MODULES auth"; fi
          if echo "$CHANGED_FILES" | grep -q "modules/alerts"; then MODULES="$MODULES alerts"; fi
          if echo "$CHANGED_FILES" | grep -q "modules/controller"; then MODULES="$MODULES controller"; fi
          if echo "$CHANGED_FILES" | grep -q "modules/locations"; then MODULES="$MODULES locations"; fi
          if echo "$CHANGED_FILES" | grep -q "modules/plans"; then MODULES="$MODULES plans"; fi
          if echo "$CHANGED_FILES" | grep -q "modules/stops"; then MODULES="$MODULES stops"; fi
          if echo "$CHANGED_FILES" | grep -q "modules/performance"; then MODULES="$MODULES performance"; fi
          
          # If no specific modules changed, deploy all (or set to empty to skip)
          if [ -z "$MODULES" ]; then
            MODULES="auth alerts controller locations plans stops performance"
          fi
          
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "should-deploy=true" >> $GITHUB_OUTPUT

  # Build and push Docker images for changed modules
  build-images:
    needs: detect-changes
    if: needs.detect-changes.outputs.should-deploy == 'true' && github.event_name != 'delete'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(format('[{0}]', needs.detect-changes.outputs.modules)) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          # Replace invalid characters with hyphens
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-z0-9-]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          # Limit length
          SANITIZED=$(echo "$SANITIZED" | cut -c1-50)
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        if: hashFiles(format('modules/{0}/apps/frontend/Dockerfile', matrix.module)) != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./modules/${{ matrix.module }}/apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/tmlmobilidade/go-${{ matrix.module }}-frontend:preview-${{ steps.branch.outputs.name }}-${{ github.sha }}
            ghcr.io/tmlmobilidade/go-${{ matrix.module }}-frontend:preview-${{ steps.branch.outputs.name }}
          build-args: |
            ENVIRONMENT=preview

      - name: Build and push API
        if: hashFiles(format('modules/{0}/apps/api/Dockerfile', matrix.module)) != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./modules/${{ matrix.module }}/apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/tmlmobilidade/go-${{ matrix.module }}-api:preview-${{ steps.branch.outputs.name }}-${{ github.sha }}
            ghcr.io/tmlmobilidade/go-${{ matrix.module }}-api:preview-${{ steps.branch.outputs.name }}
          build-args: |
            ENVIRONMENT=preview

      - name: Build and push nginx
        if: hashFiles(format('modules/{0}/apps/nginx/Dockerfile', matrix.module)) != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./modules/${{ matrix.module }}/apps/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/tmlmobilidade/go-${{ matrix.module }}-nginx:preview-${{ steps.branch.outputs.name }}-${{ github.sha }}
            ghcr.io/tmlmobilidade/go-${{ matrix.module }}-nginx:preview-${{ steps.branch.outputs.name }}
          build-args: |
            ENVIRONMENT=preview

  # Deploy to Kubernetes
  deploy-to-k8s:
    needs: [detect-changes, build-images]
    if: needs.detect-changes.outputs.should-deploy == 'true' && github.event_name != 'delete'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(format('[{0}]', needs.detect-changes.outputs.modules)) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-z0-9-]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          SANITIZED=$(echo "$SANITIZED" | cut -c1-50)
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT
          echo "namespace=${{ env.KUBERNETES_NAMESPACE_PREFIX }}-$SANITIZED" >> $GITHUB_OUTPUT
          echo "subdomain=$SANITIZED-${{ matrix.module }}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl for OCI
        run: |
          mkdir -p ~/.kube
          echo "${{ env.OCI_KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl config use-context ${{ env.OCI_KUBERNETES_CLUSTER_ID }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ steps.branch.outputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ steps.branch.outputs.namespace }} \
            preview=true \
            branch=${{ steps.branch.outputs.name }} \
            module=${{ matrix.module }} \
            pr=${{ github.event.pull_request.number || 'none' }}

      - name: Deploy Kubernetes resources
        run: |
          # Generate and apply Kubernetes manifests
          envsubst < .github/k8s/preview-deployment-template.yaml | kubectl apply -f -
        env:
          NAMESPACE: ${{ steps.branch.outputs.namespace }}
          MODULE: ${{ matrix.module }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
          IMAGE_TAG: preview-${{ steps.branch.outputs.name }}
          SHA: ${{ github.sha }}

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/${{ matrix.module }}-frontend -n ${{ steps.branch.outputs.namespace }} --timeout=5m || true
          kubectl rollout status deployment/${{ matrix.module }}-api -n ${{ steps.branch.outputs.namespace }} --timeout=5m || true
          kubectl rollout status deployment/${{ matrix.module }}-nginx -n ${{ steps.branch.outputs.namespace }} --timeout=5m || true

      - name: Get ingress IP
        id: ingress
        run: |
          INGRESS_IP=$(kubectl get ingress ${{ matrix.module }}-ingress -n ${{ steps.branch.outputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "")
          if [ -z "$INGRESS_IP" ]; then
            INGRESS_IP=$(kubectl get ingress ${{ matrix.module }}-ingress -n ${{ steps.branch.outputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "")
          fi
          echo "ip=$INGRESS_IP" >> $GITHUB_OUTPUT

      - name: Create/Update Cloudflare DNS record
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ env.CLOUDFLARE_ZONE_ID }}
        run: |
          SUBDOMAIN="${{ steps.branch.outputs.subdomain }}"
          DOMAIN="${{ env.BASE_DOMAIN }}"
          INGRESS_IP="${{ steps.ingress.outputs.ip }}"
          
          # Check if record exists
          RECORD_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records?type=A&name=$SUBDOMAIN.$DOMAIN" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[0].id // empty')
          
          if [ -n "$RECORD_ID" ]; then
            # Update existing record
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$SUBDOMAIN\",\"content\":\"$INGRESS_IP\",\"ttl\":300,\"comment\":\"Preview environment for branch ${{ steps.branch.outputs.name }}\"}"
          else
            # Create new record
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$SUBDOMAIN\",\"content\":\"$INGRESS_IP\",\"ttl\":300,\"comment\":\"Preview environment for branch ${{ steps.branch.outputs.name }}\"}"
          fi

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${{ steps.branch.outputs.subdomain }}.${{ env.BASE_DOMAIN }}`;
            const comment = `🚀 Preview environment deployed!\n\n**${{ matrix.module }}** module: ${url}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Cleanup job
  cleanup:
    if: github.event_name == 'delete' || (github.event_name == 'pull_request' && github.event.action == 'closed')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name || github.ref }}"
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-z0-9-]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          SANITIZED=$(echo "$SANITIZED" | cut -c1-50)
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT
          echo "namespace=${{ env.KUBERNETES_NAMESPACE_PREFIX }}-$SANITIZED" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl for OCI
        run: |
          mkdir -p ~/.kube
          echo "${{ env.OCI_KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl config use-context ${{ env.OCI_KUBERNETES_CLUSTER_ID }}

      - name: Delete Kubernetes namespace
        run: |
          if kubectl get namespace ${{ steps.branch.outputs.namespace }} 2>/dev/null; then
            kubectl delete namespace ${{ steps.branch.outputs.namespace }} --wait=true --timeout=5m
          fi

      - name: Cleanup Cloudflare DNS records
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ env.CLOUDFLARE_ZONE_ID }}
        run: |
          # Find all DNS records for this branch
          RECORDS=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records?comment=*${{ steps.branch.outputs.name }}*" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[] | "\(.id)|\(.name)"')
          
          echo "$RECORDS" | while IFS='|' read -r RECORD_ID RECORD_NAME; do
            if [ -n "$RECORD_ID" ] && [ "$RECORD_ID" != "null" ]; then
              echo "Deleting DNS record: $RECORD_NAME (ID: $RECORD_ID)"
              curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/dns_records/$RECORD_ID" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json"
            fi
          done

      - name: Cleanup Docker images
        run: |
          # Note: GitHub Container Registry cleanup requires manual setup or GitHub API calls
          # This is a placeholder - you may want to use gh CLI or GitHub API
          echo "Docker image cleanup should be handled separately or via retention policies"