apiVersion: apps/v1
kind: Deployment
metadata:
  name: exporter-cleaner
  namespace: go-exporter
  labels:
    app: exporter-cleaner
    app.kubernetes.io/name: exporter-cleaner
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: go-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exporter-cleaner
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: exporter-cleaner
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: cleaner
          image: ghcr.io/tmlmobilidade/go-exporter-cleaner:k8s
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: exporter-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
