# # #

name: 'Build CLI apps'

# # #

on:
  workflow_dispatch:
  push:
    branches:
      - prd
    paths:
      - 'cli/**'
      - 'packages/**'
      - '.github/workflows/build-cli.yml'
      - '.github/actions/**/*'
      - '.github/templates/**/*'

# # #

env:
  CLI_APPS: |
    backupd
    export-data
    generate-offer-files
    repo-rinse
    repo-version
    env-sync

# # #

jobs:

  generate-package-lock:
    name: Generate package-lock.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --package-lock-only

      - name: Save package-lock.json as artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-lock.json
          path: package-lock.json
          retention-days: 1

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  prepare-matrix:
    name: Prepare publish matrix
    runs-on: ubuntu-latest
    needs: generate-package-lock
    outputs:
      cli_apps: ${{ steps.matrix.outputs.cli_apps }}
    steps:
      - name: Generate matrix from CLI_APPS
        id: matrix
        run: |
          apps=$(printf '%s\n' "${CLI_APPS}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | sed '/^$/d' | sed 's/.*/"&"/' | paste -sd "," -)
          echo "cli_apps=[${apps}]" >> "$GITHUB_OUTPUT"

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  version-number:
    name: 'Version Number'
    runs-on: ubuntu-latest
    steps:
      - id: generate-version-number
        run: |
          version="$(date +%Y%m%d).$(date +%H%M).$(date +%S)"
          echo "Generated version: $version"
          echo "version_number=$version" >> "$GITHUB_OUTPUT"
    outputs:
      version_number: ${{ steps.generate-version-number.outputs.version_number }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  publish:
    name: 'Publish package'
    runs-on: ubuntu-latest
    needs: [prepare-matrix, version-number]
    strategy:
      fail-fast: false
      matrix:
        cli_app: ${{ fromJSON(needs.prepare-matrix.outputs.cli_apps) }}
    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
          registry-url: 'https://registry.npmjs.org/'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Setup Turbo
        run: npm install -g turbo@^2

      - name: Download package-lock.json artifact
        uses: actions/download-artifact@v8
        with:
          name: package-lock.json
          path: .

      - name: Install workspace dependencies
        working-directory: .
        run: npm ci

      - name: Build CLI app
        working-directory: .
        run: turbo run build --filter=./cli/${{ matrix.cli_app }}

      - name: Bump package version
        working-directory: cli/${{ matrix.cli_app }}
        run: npm version --no-git-tag-version ${{ needs.version-number.outputs.version_number }}

      - name: Publish package to NPM
        working-directory: cli/${{ matrix.cli_app }}
        run: npm publish --access public