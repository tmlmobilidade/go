# # #

name: 'Replicator | Build & Test'

# # #

on:
  workflow_dispatch:
  push:
    paths:
      - 'replicator/packages/**'
      - 'replicator/apps/**'
    branches:
      - production
      - staging

# # #

jobs:

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

  enrich:
    name: enrich (NodeJS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@master
        with:
          push: true
          context: ./replicator
          file: ./replicator/apps/enrich/Dockerfile
          tags: ghcr.io/tmlmobilidade/sae-enrich:${{ github.ref_name }}

  # # # # # # # # # # # # # # # # # # # # #
