      - name: Build and Push Docker Image
        uses: docker/build-push-action@master
        with:
          push: true
          context: ./plans/apps/nginx
          file: ./plans/apps/nginx/Dockerfile
          tags: ghcr.io/tmlmobilidade/go-plans-nginx:${{ github.ref_name }}
          build-args: |
            NGINX_SERVER_NAME=${{ github.ref_name == 'staging' && 'staging.plans.sae.carrismetropolitana.pt' || 'plans.sae.carrismetropolitana.pt' }}

  # # # # # # # # # # # # # # # # # # # # #
  # # # # # # # # # # # # # # # # # # # # #

