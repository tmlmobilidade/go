# # #
# USE THIS FILE TO STARTUP AN INSTANCE OF A MONGODB DATABASE
# This database can then be used for all applications in the SAE project,
# as they all have different collection names. Tha database is initialized
# with a mock data dump, which can be found in the "mock.dump" file,
# which contains an "admin" user with the password "root"

name: tmlmobilidade-sae-dev

services:
    sae-db:
        image: mongo:latest
        ports:
            - 37001:27017
        environment:
            MONGO_INITDB_ROOT_USERNAME: root
            MONGO_INITDB_ROOT_PASSWORD: root
            MONGO_INITDB_DATABASE: production
        volumes:
            - ./mock.dump:/dump/db.dump
            - ./local-setup.sh:/docker-entrypoint-initdb.d/setup.sh
